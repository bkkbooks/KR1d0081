body:
  text: 讀禮志疑卷五贈內閣學士陸隴其撰孔疏辨王鄭廟制之異同有曰家語先儒以為肅之所作未足可依蓋為鄭學者排王肅并疑肅所表章之家語但孔氏於此止述衆説之同異而不斷其孰是至尚書七世之廟可以觀德疏始言鄭説之非蓋漢唐儒者解經必守家法故如此孔疏謂諸侯不敢祖天子若有大功德王特命立之則可若魯有文王之廟鄭祖厲王是也魯非但得立文王之廟又立薑嫄之廟及魯公武公之廟并周公及親廟除文王廟外猶有八廟也此皆有功德特賜非禮之正也愚案周世廟莫淆于魯孔疏謂大夫三廟者天子諸侯之大夫皆同知者以此及祭法歷陳天子諸侯即云大夫更不别云諸侯之大夫故知與天子大夫同也卿即大夫總號其三公即與諸侯同愚案天子之卿大夫受地與侯伯同而廟制却與侯伯異又士一廟鄭注云謂諸侯之中士下士名曰官師者孔疏云既云諸侯之中士下士一廟則天子之中士下士皆二廟也必知皆二廟者以其總稱元士愚案大夫既與諸侯之大夫同而中士下士又與諸侯之中士下士異此等皆可從但云天子七廟是周制則難從又王制不言天子畿內諸侯有卿蔡仲之命曰周公以為卿士孔疏謂周禮都鄙建其長立其兩馬鄭皆云亦卿兩人是畿內諸侯立二卿愚案此可以補王制之闕春曰礿夏曰禘秋曰嘗冬曰蒸鄭注以此為夏殷祭名而非周制一則證以周禮宗伯之文一則證以小雅礿祠蒸嘗之文而于祭義郊特牲之言春禘者則直改為禴此等處集説亦無以議之天子犆礿祫禘祫嘗祫蒸諸侯礿犆禘一犆一祫嘗祫蒸祫此條集説與鄭注不同集説謂有時祫有大祫王制所言乃是時祫鄭注則只是大祫並無所謂時祫集説謂祫嘗祫蒸與嘗祫蒸祫變文而已非有異也鄭注則云天子先祫而後時祭諸侯先時祭而後祫又王肅以禘為大祫為小康成則以祫為大禘為小謂禘則太王王季以上遷主祭于后稷之廟其坐位乃與祫相似其文武以下若穆之遷主祭于文王之廟文王東面穆主皆北面無昭主若昭之遷主祭于武王之廟武王東面其昭主皆南面無穆主又康成之説又有練時之禘此等康成説皆不可從至杜預謂祫即禘也尤謬若康成謂魯禮三年喪畢而祫于太祖明年春禘于羣廟自爾之後五年而再殷祭一祫一禘其意以禘祫之年皆從三年喪畢後數起此似近理關譏而不征孔疏謂此夏殷法周則有門關之征若凶年則無稅也愚按孟子所説大抵不純是周制升于司徒者不征于鄉升于學者不征于司徒曰造士孔疏云雖升司徒猶給鄉之繇役以藝業未成身雖升學亦以學未成猶給司徒繇役若其學業既成免其繇役愚按依疏言則選士俊士猶未是造士直待學成然後免征而為造士依集説則選士俊士即是造士孔疏似長司會以歲之成質于天子一條集説謂以周制異而不言其異在何處孔疏謂以周法言之司會總主羣官簿書而此則司徒司馬司空各質于天子不由司會愚按周法即如今之錢糧歸併户部王制所言則明朝之各部考成也皇收冔冕不言衣鄭氏則補之曰凡冕屬其服皆玄上纁下有虞氏十二章周九章夏殷未聞深衣燕衣縞衣玄衣不言冠鄭氏則補之曰其冠則牟追章甫委貌也又以皇與下冕相對故為冕屬又以經云夏后氏燕衣而養老周人玄衣而養老周人燕服玄衣故知養老燕羣臣之服也又以燕禮諸侯燕臣子用朝服明天子之燕亦朝服也又因玉藻天子皮辨以日視朝故知天子與諸侯朝服之别集説于此殊踈略凡三王養老皆引年可見王政之等殺六十不親學注云不能備弟子禮愚案弟子之禮亦且因年而減今人有老而營營于勢利甘為人下者亦獨何哉為田九萬億畝疏本有二説一説謂萬億字誤一説謂皇氏以為億數不定或以十萬為億或以萬萬為億或以一萬為億此云萬億者祗是萬萬也六國時或將萬為億故云萬億但古事未知孰是故備存焉今集説但謂經文誤是用其前説愚謂皇氏説亦有理地與星辰四遊之説月令孔疏引鄭氏考靈耀之注甚詳孔氏本不以説為是然却云禮是鄭學故具言之賢者裁焉可見其守家法之嚴孔疏又引鄭考靈耀注曰日有九道黃道一青道二出黃道東赤道二出黃道南白道二出黃道西黑道二出黃道北日春東從青道夏南從赤道秋西從白道冬北從黑道立春星辰西遊日則東遊春分星辰西遊之極日東遊之極日與星辰相去三萬里夏則星辰北遊日則南遊夏至星辰北遊之極日南遊之極日與星辰相去三萬里以此推之秋冬可知又云月行九道並與日同愚按此言日之九道本因四遊而然今法既不用四遊則日恐難以九道言鄭注月令謂凡此車馬衣服皆所取于殷時而有變焉非周制也周禮朝祀戎獵車服各以其事不以四時為異又玉藻曰天子龍衮以祭玄端而朝日皮辨以日視朝于此皆殊疏云虞夏之制有日月星辰十二章之服周之制朝祀戎獵車服各有殊今此下與周禮不同上與虞夏又異故云取殷時也殷時木輅此乘鸞輅不純用殷故云而有變焉愚案以月令車馬衣服為殷制此亦説得有據集説略而不言何故先立春三日孔疏云周法四時迎氣皆前期十日而齊散齊七日致齊三日今秦法簡省故三日也蓋散齊二日致齊一日愚按此則安知不是夏殷之法何以知其必是秦法孔疏云賈馬蔡雍皆謂迎春祭太皥及勾芒鄭則以為蒼帝靈威仰愚按依宗伯注則鄭説四時迎氣亦兼祭五人帝五人神宿離不貸鄭注云離讀如儷偶之儷宿儷謂其屬馮相氏保章氏掌天文者相與宿偶當蕃候伺不得過差也疏云恆在候處相與止宿配偶共審察伺候愚案此句集説殊不若注疏之明天氣下降孔疏云天地之氣謂之隂陽一年之中或升或降故聖人作象各分為六爻以象十二月愚案此云六爻象十二月精矣但月令于正月而曰天氣下降地氣上騰於十月而曰地氣下降天氣上騰方其升而謂之下降方其降而謂之上騰畢竟可疑孔疏亦未甚明白孔疏曰斗星隨天而轉日一夜過轉一周而行一度故正月建寅二月建卯愚按此亦如日之不及天一度也然不知亦有歲差否鄭注漢始以驚蟄為正月中疏云劉歆作三統厯改驚蟄為二月節律厯志因之蓋蟄蟲正月始驚二月大驚故移驚蟄為二月節雨水為正月中愚按此考古厯者所當知季春大合樂鄭注云大合樂者所以助陽達物風化天下也其禮亡按周禮大胥賈疏謂文王世子之大合樂則大胥所謂春入學合采合舞秋頒學合聲也月令季春之大合樂則大胥所謂以六樂之會正舞位也月令孟春其祀户祭先脾鄭注云凡祭五祀于廟用特牲有主有尸皆先設席于奧祀户之禮南面設主于户內之西乃制脾及腎為俎奠于主北又設盛于爼西祭黍稷祭肉祭醴皆三祭肉脾一腎再既祭徹之更陳鼎俎設饌于筵前迎尸略如祭宗廟之儀孔疏曰此皆逸中霤禮文云祭五祀于廟者設祭户祭中霤在于廟室之中先設席于廟室之奧若祀竈祀門祀行皆在廟門外先設席于廟門之奧雖廟室廟門有别總而言之皆謂之廟故云凡祭五祀于廟此謂殷禮若周則七祀加司命與厲也不審祀之處所亦當與竈門行等俱在廟門之外祀也若周總在宫內故宫法正云祭社稷七祀于宫中云有主有尸者謂天子諸侯若卿大夫廟無主則五祀無主也云肉脾一腎再者申明祭肉三度之事其祭肉三者脾尊故一祭腎卑故再祭云既祭徹之更陳鼎俎設饌于筵前者謂既祭黍稷祭肉醴之後徹去俎之與盛更陳列鼎俎設其饌食于初設奧之筵前其時主已移于筵上主人出户迎尸尸入即筵而坐但宗廟之祭尸入之後始祭籩豆及黍稷醴其祭户之時已于西祭黍祭肉祭醴今迎尸而入則應坐而饌食不更祭黍稷祭肉祭醴故云略如祭宗廟之儀祭户所以先設席于奧乃設饌筵迎尸皆在奧者就尊之處也中間設主祭黍祭肉户西者就户處也其餘五祀所祭設主皆就其處也又孟夏之月其祀竈祭先肺鄭注云竈在廟門外之東祀竈之禮先席于門之奧東面設主于竈陘乃制肺及心肝為俎奠于主西又設盛于俎南亦祭黍三祭肺心肝各一祭醴二亦既祭徹之更陳鼎俎設饌于筵前迎尸如祀户之禮孔疏云竈陘謂竈籩承器之物以土為之愚按論語云與其媚于奧寧媚于竈想春秋之末迎尸之禮將廢而時人之議論如此雖賈之引此另自有謂而即此二語亦可見古禮之變革有由又按鄭注五祀孔疏皆謂是逸中霤禮文可見逸禮唐初尚存鄭注於仲夏大雩帝云春秋傳曰龍見而雩雩之正當以四月凡周之秋三月之中而旱亦修雩禮以求雨因著正雩此月失之矣又于季夏命漁師代蛟取鼉登龜取黿注云四者甲類秋乃堅成周禮曰秋獻龜魚又曰凡取龜用秋時是夏之秋也作月令者以為此秋據周之時也周之八月夏之六月因書于此似誤也愚按此鄭注仔細處集説皆略而不言是月也日長至隂陽爭死生分君子齋戒處必掩身母躁止聲色毋或進薄滋味母致和節嗜欲定心氣百官靜事無刑以定晏隂之所成愚按君子之養微隂也與微陽同蓋隂之不正者固當謹防之大易之履霜是也隂之正者則必長養之月令之晏隂是也鄭注黼黻文章云白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章與虞書黼黻之注絶不同玩孔疏中央土每時輒寄一十八日其説本起于日之四遊四遊之説既不可從則寄旺之説恐亦難信律中黃鐘之宫孔疏云四時之律皆取氣應而土王之律獨取聲應者一者欲與四行為互二者為無别候土氣之管故也土無候氣之管者以寄王四季之末故從四時之管而不别候也唯以四行未十八日為土之氣也蔡氏及熊氏以為黃鐘之宫謂黃鐘少宫也半黃鐘九寸之數管長四寸五分六月用為候氣案六月林鐘之律長六寸七月夷則長五寸三分有餘何以四寸五分之律於六月候之乎又土聲最濁何得以黃鐘半聲相應乎蔡熊之説非也愚案此處終屬可疑四寸五分之管既不可候六月之氣九寸之管之聲何以應于六月乎仲春云日夜分則同度量鈞衡石角斗甬正權概鄭注以度量鈞衡石五者總蒙同文三十斤曰鈞集説則謂鈞是平其輕重之差以鈞衡石三字作一句愚案仲秋日夜分則同度量平權衡正鈞石角斗甬則鈞明是三十斤之鈞集説于仲秋注云此與仲春同若如集説仲春之解則豈可同乎孟冬天子乃祈來年於天宗大割祠于公社及門閭臘先祖五祀孔疏云此等之祭總謂之蠟若細别言之天宗公社門閭謂之蠟其臘先祖五祀謂之息民之祭集説殊不明白禴祠蒸嘗四時正祭皆不見于月令季秋之嘗孟冬之大飲蒸鄭注皆不作宗廟之祭講我百爾九十吾與爾三焉鄭注云文王以勤憂損壽武王以安樂延年言與爾三者明傳業于女女受而成之愚按鄭氏蓋恐人疑文王所以與之之故而以憂樂言之似切實矣然聞以無逸永年矣不聞以安樂延年也斯言也得無啓人主逸豫之念乎不若集説直指為好事者之辭文王世子疏云諸侯謂之小樂正天子謂之樂師此有大樂正小樂正周禮有大司樂有樂師故知小樂正當樂師也但此經雜多有諸侯之禮故謂之大樂正小樂正也又大司成論説在東序鄭注云樂正司業父師司成即大司成司徒之屬師氏也疏云鄭以下文云樂正司業父師司成父師與樂正相連此大司成亦與大司樂相次故知司成即大司成也以其掌教故知是司徒之屬以其父師司成又掌教國子故知當師氏也愚按大司樂大司成各自一官注疏甚明小注却云大司成即大司樂謬矣凡始立學者必釋奠于先聖先師疏云天子立虞夏殷周四代之學若諸侯止立時王一代之學有大學小學耳其所習經業皆于時王學中其鄉學為庠愚按觀此則孟子所謂學則三代共之者其中仍有天子諸侯大小之不同文王之為世子也教世子周公踐阼此三句注疏皆作結上文語集説皆作衍文當從注疏集説又云周公踐阼句缺一相字遂啓明堂位周公踐天子位之説愚按大全嚴陵方氏曰成王主也故於阼曰涖周公相之而已故於阼曰踐此輕重之别也如此説雖缺相字亦自無弊文王世子言公族內朝以齒外朝以官其在宗廟之中則如外朝之位愚按如此則中庸序爵今講家以為専是異姓者誤矣公與族燕則異姓為賔膳宰為主人愚按今士大夫有為同姓設燕者亦當本此意為之守于公禰此本是遷主而謂之禰鄭注云言禰在外親也集説云禰當讀作祧愚按此亦當從鄭注下管象舞大武只宜用注疏舊説集説取嚴氏之説殊支離鄭注燔黍捭豚云中古未有釜甑釋米捭肉加于燒石之上而食之耳今北狄猶然孔疏云伏羲為上古神農為中古五帝為下古若易歷三古則伏羲為上古文王為中古孔子為下古若三王對五帝則五帝亦為上古故士冠記云大古冠布下云三王共皮辨則大古五帝時大古亦上古也不同者以其文各有所對故上古中古不同也此云中古者謂神農也愚按大古中古無定屬最是集説以此節為上古非玄酒在室一條孔疏敘九獻之禮甚明可以補儀禮之缺但云大祫于太廟則備五齊三酒大禘則用四齊三酒此拘于康成祫大禘小之説也孔疏謂鄭注云腥其俎謂豚解而腥之者按士喪禮小斂之奠載牲體兩髀兩肩兩胉并脊凡七體也士虞禮主人不視豚解注云豚解解前後脛脊脅而已是豚解七體也按特牲少牢以薦熟為始之時皆體解無豚解以無朝踐薦腥故也其天子諸侯既有朝踐薦腥故知腥其俎之時豚解云熟其殽謂體解而爓之者體解則特牲少牢所升于俎以進神者是也按特牲九體肩一臂二臑三肫四胳五正脊六橫脊七長脅八短脅九少牢則十一體加以脡脊代脅為十一體也是分豚為體解此熟其殽謂體解訖以湯爓之不全熟次于腥而薦之堂愚按此解熟其殽雖引特牲少牢然周禮籩人疏云天子諸侯大夫士雖同名饋食仍有少别何者天子諸侯尸食前仍有饋獻二是饋孰隂厭隂厭后尸入室食乃獻大夫士則饋孰與黍稷為隂厭隂厭前無饋獻以此為異耳又司几筵注曰祼于室饋食于堂繹于祊疏云饋食于堂謂饋獻節據有熟故言饋食其食未有黍稷集説不分别朝踐饋食又不分别大夫士欠明澄酒在下孔疏言鄭意澄為沈齊酒為三酒與集説不同魯之郊禘非禮也周公其衰矣孔疏云魯合郊禘也但郊失禮則牛口傷禘失禮躋僖公集説云成王之賜固非伯禽之受尤非此二説當從集説禮運以大夫聲樂皆具為非禮孔疏云大夫自有判縣之樂而不得如三桓舞八佾一曰大夫祭不得用樂者故少牢饋食無奏樂之文唯君賜乃有之愚按此二説本一意所謂判縣者是君賜乃有論語注謂大夫四士二亦是如此皆從其初皆從其朔此二語最好蓋以迹而觀則養生送死禮制日備較之蕢桴土鼓營窟檜巢之日不啻霄壤究之因時制宜無非從其天理之自然三代之興何嘗非大道之行哉比前大同小康之語醇純多矣鄭注云體其犬豕牛羊謂分别骨肉之貴賤以為衆俎也孔疏云知非尸前正俎者以此經所陳多是祭末之事若是尸前正俎當云是謂合莫不得云是謂大祥既是人之祥善故為祭末饗燕之衆俎也集説亦用此説愚按此恐未必然康成之意亦似不如此聖人能以天下為一家鄭注曰耐古能字孔疏曰古之能字皆作耐字今書雖悉作能或有作耐字者則此耐以天下為一家及樂記云人不耐無樂是古字時有存者亦有誤不安寸直作而字則易屯彖云利建侯而不寧及劉向説苑能字皆為而也愚按此古今字體之變不可不知集説止云耐音能略甚禮運中精語如人者天地之心人情以為田學者所當細味律吕上生下生先儒之説不同何椒丘曰黃鐘下生林鐘林鐘上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鐘應鐘上生㽔賔㽔賔重上生大吕大吕下生夷則夷則上生夾鐘夾鐘下生無射無射上生仲吕此京馬鄭蔡諸儒及杜佑通典所説也然班固漢書所載律吕相生皆一上一下而京房等乃自㽔賔重上生大吕以後咸易漢志上下之號何哉蓋一上一下者相生之道也言重上生者吹候之用也論隂陽相生之正則當從班氏之説若必施之吹候之用則當從京馬鄭蔡之説二者並行而不悖焉愚按今集説所用亦京馬鄭蔡之説也王前巫而後史卜筮瞽侑皆在左右集説石梁王氏曰巫祭祀方用卜筮有事方問謂嘗在左右非也大全西山真氏曰巫掌祀以鬼神之事告王史掌書以三皇五帝之事告王掌卜筮者以吉凶諫王瞽蒙之瞍以歌詩諫王一人之身而左右前後挾而維之雖欲斯須自放得乎愚按此一條當從真氏又禮必本于太一孔疏云太一者謂天地未分混沌之元氣也集説石梁王氏曰禮家見易有太極字翻出一個太一仍是諸子語真氏讀書記云太一者即太極之異名愚按此一條亦當從真氏禮器孔疏云忠者內盡於心也信者外不欺于物也解忠信二字最明白禮也者合乎天時一條孔疏曰前云忠信為本易見而義理為文難覩故此以下廣説義理為文之事集説無此明白又按舉其定國之數以為禮之大經孔疏云禮物必鄉之所有故有國者必書其國內所生物多少定數以為國之大法集説於此亦殊混必舉其定國之數一條當與王制冡宰制國用一條同看孔子曰我戰則克祭則受福蓋得其道矣鄭注謂我字是指知禮者孔疏云知非孔子自我者君子務在謙光不應自言祭祀受福之事愚按注疏此説比集説作孔子自言者其義較長或素或青鄭注云變白黑言素青者秦二世時趙髙欲作亂或以青為黑黑為黃民言從之至今語猶存也孔疏云是鹿馬之類愚按此可補史之略禮之以多為貴者以其外心者也禮之以少為貴者以其內心也此分而言之也若合而言之則以少為貴亦是心之盡於外處內心外心原是一時俱有禮有擯詔樂有相步溫之至也鄭注解溫為溫藉孔疏皇氏云溫謂承藉凡玉以物緼裏承藉君子亦以威儀擯相自承藉愚按今人喜用藴藉二字蓋本此即易物不可以苟合之意又上文三月繫七日戒三日宿慎之至也鄭注云將有祭祀之事必先敬慎如此不敢切也孔疏云禮須積漸不敢切迫也按注疏解慎字俱用溫藉之義蓋經文慎與溫本交互言之醴酒之用玄酒之尚割刀之用鸞刀之貴莞簟之安而稿鞂之設此義見禮器又見郊特牲蓋即所云禮之近人情者非其至者也與七介相見三辭三讓而至不可直情徑行者又不同合之乃見禮意因名山升中於天此一句鄭注作封禪解集説駁之雖仍用鄭氏中猶成也之義然只作巡狩燔柴解此等處集説最有功蓋程朱以來諸儒之意也元明兩代不講封禪皆是儒者解經之力經學之關係豈不大哉綱目梁天監八年許懋曰舜柴岱宗是為巡狩而鄭引孝經鈎命決云封于泰山禪于梁甫此緯書之曲説非正經之通義也懋亦賢矣哉內則子事父母櫛縰笄總笄字無注孔疏曰笄者著縰既畢以笄插之熊氏云此笄謂安髻之笄以縰韜髮作髻既訖橫施此笄於髻中以固髻也故士喪禮云笄用桑長四寸纋中是也纋中謂殺其中使細非固冠之笄故文在冠上冠有纓者無笄又婦事舅姑櫛縰笄總鄭注云笄今簪也孔疏曰謂婦人之笄異于上男子笄縰故于此始云笄今簪也則與士冠禮男子爵辨笄皮辨笄同故鄭注冠禮亦云笄今之簪也則喪服女子古笄尺二寸也大全朱子曰婦人不冠則所謂髻笄即為固髻之用亦名為簪而非如二辨之簪矣愚按合注疏及朱子之言觀之則男子之笄有二種婦人之笄又另是一種升降出入揖遊揖遊二字注疏集説大全俱無解惟小學注説得明魚膾芥醬芥醬二字注疏集説俱無解自蝸醢至卵鹽二十六物大全長樂劉氏曰士庶不可得而備之也偶其有者則如此法以制之凡為人子婦者預當知之以敬于祭祀則鬼神享之以奉于燕飲則賔客樂之以饌于尊親則衰病宜之愚按如此説方見內則之喫緊為人處既養老而后乞言亦微其禮此恐其勞動故云然鄭注云微其禮者依違言之求而不切也孔疏云依違求之而不逼切此説得明集説云其禮微略不誠切以求之便不明白妾御當夕之制不特注疏言之而集説亦用之今人乃以色荒為疑不知此是言其制度如此若夫清心寬欲則存乎其人而已猶之天子之羞百二十品特備其制爾豈必遍嘗之哉接以太牢王肅杜預並以為接待夫人以太牢鄭注云接讀為捷捷勝也謂食其母使補虛強氣也集説則云以太牢之禮接見其子恐當從鄭説請肄簡諒鄭注云請習簡謂所書篇數也請習信謂應對之言也集説云諒言語信實也愚按應對之言而謂之諒蓋言以信實為主也集説又一説簡者簡要此易啓人苟簡之病當刪二十博學不教此一語最切今人病痛今學者苦于衣食之纍往往以訓蒙為治生之策甚有不及二十而為人師者矣其為害可勝道哉集説云不教恐所學未精故不可為師以教人也旨哉言乎凡女拜尚右手孔疏云漢時行之也愚按觀此則唐初男女之拜已無左右之分玉藻疏云漢明帝時用曹褒之説皆用白旒珠與古異也愚按此則玉藻之制自東漢而變玄端而朝日注疏皆謂端當為冕集説亦從之大全方氏則云玄端者祭服燕服之總名衣玄衣而加玄冕則為祭服衣玄衣而加玄冠則為燕服此與注疏集説俱不同聽朔于南門之外鄭注云東門南門皆為國門也天子廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿路寢亦如之愚按康成之意蓋謂聽朔于南門外之明堂也經文止言南門外而不言明堂此注亦是補經之法鄭注云天子廟及路寢皆如明堂制孔疏云按考工記夏后氏世室鄭注云謂宗廟殷人重屋注云謂正寢也周人明堂鄭云三代各舉其一明其制同也然太廟路寢既如明堂則路寢之制上有五室不得有房而顧命有東房西房鄭答趙商云成王崩時在西都文王遷豐鎬作靈臺辟雍而已其餘猶諸侯制度焉故知此喪禮設衣物有夾有房也周公攝政制禮作樂乃立明堂於王城如鄭此言是成王崩時路寢猶如諸侯之制故有左右房也然西都宫室既如諸侯制按詩斯干云西南其户箋云路寢制如明堂是宣王之時在鎬京而云路寢制如明堂則西都宫室如明堂也故張逸疑而致問鄭答之云宣王承亂又不能如周公之制如鄭此言則成王崩時因先王舊宫室至康王已後所營依天子制度至宣王之時承亂之後所營宫室還依天子制度路寢如明堂也不復能如周公之時先王之宫室也愚按此疏説得最周密然謂太廟路寢明堂之制同屬可疑明堂位謂太廟天子明堂其誤亦同康成主明堂五室之説而謂九室三十六户七十二牖是秦相吕不韋作春秋時説者所益非古制也此與朱子意不同又按康成解月令亦只是主五室之説其意蓋以九室乃後儒誤解不韋月令也集説于月令玉藻殊欠明白閏月則闔門左扉立於其中鄭注云聽其朔于明堂門中還處路寢門終月孔疏云於文王在門謂之閏是閏月聽朔于明堂門反居路寢門皇氏云明堂有四門即路寢亦有四門閏月各居其時當方之門義或然也愚按此因路寢如明堂之説而遂謂路寢亦四門益難信動則左史書之言則右史書之孔疏以周禮之五史參考之知其即太史內史最見精細集説則不問其為何官矣陸翼王集説補正亦備載孔疏之説朝服以日視朝于內朝鄭注云朝服冠玄端素裳也孔疏云按王制周人玄衣而養老注云玄衣素裳天子之燕服為諸侯朝服彼注云玄衣則此玄端也若以素為裳則是朝服此朝服素裳皆得謂之玄端故論語云端章甫注云端玄端諸侯朝服若上士以玄為裳中士以黃為裳下士以雜色為裳天子諸侯以朱為裳則皆謂之玄端不得名為朝服也又朝玄端夕深衣疏曰大夫士視私朝故服玄端若朝君之時則朝服也朝服其衣與玄無異但其裳以素耳愚按此分别朝服與玄端最明但朝禮則君臣同服若宗廟之事則君不服玄端亦不服朝服故論語蒙引謂君臣同服者非告朔聽朔之制內朝外朝之别此處孔疏説得最明麛裘青犴褎絞衣以裼之鄭注既云絞蒼黃之色又引論語素衣麛裘孔疏引皇氏云素衣為正記者亂言絞耳集説不分别殊略諸儒言明堂之説不一蔡雍云明堂太廟辟雍是一處此説最無理讀禮志疑卷五
