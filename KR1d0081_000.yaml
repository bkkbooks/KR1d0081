body:
  text: 讀禮志疑禮類四三禮總義之屬提要臣等謹案讀禮志疑六卷國朝陸隴其撰隴其有古文尚書考已著録是編以三禮之書多由漢儒採輯而成其所載古今典禮自明堂清廟吉凶軍賔嘉以及名物器數之微互相考校每多齟齬不合因取孔鄭諸家注疏折衷於朱子之書務得其中並旁及春秋律吕與夫天時人事可與禮經相發明者悉為採入其有疑而未決者則仍闕之故曰讀禮志疑案禮經自經秦火雖多殘闕不完而漢代諸儒去古未逺其所訓釋大抵有所根據不同於以意揣求宋儒義理雖精而博考詳稽終不逮注疏家專門之學隴其覃思心性墨守程朱其造詣之醇誠近代儒林所罕見至於討論三禮究與古人之終身穿穴者有殊然孔疏篤信鄭注往往不免附㑹而陳澔集說尤為弇陋隴其隨文糾正考核折衷其用意實非俗儒所能及如論孔疏月令引太史鄭注中數曰嵗朔數曰年並舉則分年嵗單舉則可互稱又祥禫主鄭駁王廟制尊劉駁鄭於禮有擯詔樂有相步溫之至也之文謂溫直是藴藉不當如孔疏所云以物承藉於未卜禘不視學取孔疏不當禘祭之年亦待時祭之後駁集說不五年不視學之說謂司尊彞變朝踐為朝獻變再獻為饋獻為省文互文之法皆確有所見足以羽翼經訓至於緇䊷純三字謂純當作䊷古人字亦誤用後來不可不慎不知古字多通原未可以近例相限又袁黃羣書備考以賈公彥訛作賈逵人所共知何煩深辨而亦特立一條為之駁正此蓋閲書時隨筆標記門弟子編次校刋乃誤入正文未加簡擇固不足為隴其病矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
