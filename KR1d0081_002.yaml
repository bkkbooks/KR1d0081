body:
  text: 讀禮志疑卷二贈內閣學士陸隴其撰魏莊渠曰神不歆非類民不祀非族故祭祀皆子孫自主之親友咸來助祭若祭他人祖考豈有感格之理世俗他人有喪輒致奠祭以此為厚而不知其為非禮也雖先哲大儒亦未免從俗然于吾心終不安蓋偶窺測得聖人制禮之本意也必欲初喪致奠曷若致賻必欲將葬致祭曷若以物助其虞祔愚按莊渠此論最合禮意旅酬之禮見于特牲有司徹鄉射鄉飲酒燕禮者參差不等故語類中庸卷內朱子所解旅酬其説亦不一語類朱子論導飲曰主人酌以獻賓賓飲主人曰酢主人又自飲而復飲賓曰酬主人飲二杯賓只飲一杯此只就獻酬之初賓奠觶未舉時而言若到酬旅之時賓坐取觶阼階前北面酬長兄弟則賓之所飲不止一杯矣中庸大全將朱子此條載于旅酬下殊欠分曉蒙引又為之説曰導飲者自飲以導賓飲也賓既飲仍以酢主人主人又飲也朱子所謂主人飲二杯賓只飲一杯此説尤謬戾考儀禮獻有酢而酬無酢安得如此説乎又中庸大全載白雲許氏之説亦止到旅之大略而止考别本許氏尚有賓弟子及兄弟弟子各舉于其長亦先自飲如旅酬所謂下為上也等語不知大全何故刪之鄭康成中庸注云旅酬下為上者謂若特牲饋食之禮賓弟子兄弟之子各舉觶于其長也逮賤者宗廟之中以有事為榮也較章句尤明蓋鄭注只是舉特牲以為例中庸所云旅酬原不必如特牲也舊本儀禮特牲篇賓弟子及兄弟弟子洗各酌于其尊條內脫却舉觶者祭卒觶拜長皆答拜十一字以儀禮經傳及楊氏禮儀圗考之可見蒙引解中庸旅酬之義最為鶻突其曰舉觶非就是各勸其長飲也只是洗盞更酌而歸之于其長其長只將此觶往勸他人飲耳絶不及弟子卒觶一節殊非儀禮之意豈其所見之儀禮乃舊本之脫落者耶特牲記止有四觶疏云一酌奠于鉶南餘有三在主人洗一觶酬賓奠于薦北賓舉奠于薦南此未舉也下篚有二觶在及兄弟弟子阼階前北面舉觶于長兄弟如主人酬賓儀此亦未舉也下篚仍有一觶在尸羞之後賓始舉奠觶行旅酬辨卒受者以虛觶奠于下篚還有二觶至為加爵者作止爵長兄弟亦坐舉其奠觶酬賓如賓酬兄弟之儀以辨卒受者未實觶于篚時賓弟子兄弟弟子洗觶各酌舉觶于其長即用其篚二觶卒受者未奠之故三觶並用也愚按此則所謂賓弟子兄弟弟子各舉觶于長者止是一個賓弟子一個兄弟弟子非是合階下之賓弟子兄弟弟子一齊舉觶也故有司徹疏云鄉飲酒及鄉射特牲等皆一人舉觶為旅酬始二人舉觶為無算爵始儐尸乃以二人為旅酬始者此儐尸别一禮與彼不同蒙引謂長非一二人賓弟子兄弟之子亦非止一二人一時並舉亦未詳儀之意矣特牲記注謂男子獻於堂上旅於堂下婦人獻於南面旅於西面然有司徹二人洗觶旅酬則在堂上蓋亦因儐尸别一禮故然至兄弟之後各舉觶於其長則仍在堂下矣吉祭喪祭古人分别甚微如曾子問鄭注云奠無尸虞不致爵小祥不旅酬大祥無無算爵是何等次第吳草廬題朱文公答陳正已講學墨帖後云朱子答正已一書備述為學之功又規正己之失蓋以其人有志於學故曲盡其言懇切之至厚哉先覺之用心乎然澄竊聞之大功廢業况服齊斬乎古人居父母之喪三年不為禮三年不為樂斬衰唯而不對齊衰對而不言自發一言且不可况可與人論學哉眉山二蘇兄弟文人爾而其居喪也冉期之內禁斷作詩作文寂無一語是亦嘗講聞乎喪禮也正已蘄學聖賢身有母喪而交書論學不異常時則三年之喪為虛矣夫親喪本也論學末也忘其本而務其末不知所論之學果何學歟朱子故已針其失然舍其大而議其小或者姑為之掩覆也耶草廬此跋辭嚴義正可為禮家羽翼少牢疏云左執筮及擊筮之筮皆是蓍以其用蓍為筮故名蓍為筮愚按古人用字之法如此者甚多當類推之少牢用薦嵗事於皇祖伯某某字也注疏引左傳諸侯以字為諡因以為族則某又或是諡也其解與杜注不同杜注是言或以字為氏或以諡為氏故將諸侯以字四字為句儀禮注疏是言大夫或因字為諡故將諸侯以字為諡六字為句左傳之解自當以杜氏為正若依鄭解則公子辰先以辰為諡而後命以為氏其説未知何據特牲少牢筮尸云以某之某為尸注云字尸父而名尸疏云鄭知字尸父而名尸者曲禮云為人子者祭祀不為尸鄭注云為其失子道然則尸卜筮無父者又云卒哭乃諱諱則不稱名故知尸父云某是字尸既對父故某為名此等注疏最精細但特牲已詳少牢又復詳釋不亦煩乎特牲前期三日筮尸少牢祭前一日筮尸特牲祭前一日視濯少牢祭之朝乃視濯特牲宿尸宗人擯祝傳命少牢惟有祀擯注疏皆云士卑不嫌故得與人君同大夫尊不敢與人君同楊氏儀禮圖分别兩篇不同處最詳此却未及少牢云肩臂臑膊骼在兩端脊脅肺肩在上愚按俎之上下有以縱言者有以橫言者肩臂臑膊骼在兩端此以縱言之上下言也脊脅肺肩在上此以橫言之上下言也閲楊氏圖如是賈疏殊欠分明古人言禮不能處處皆詳因其詳處推到略處則彼此皆明如少牢云司宫設罍水於洗東有枓鄭注云設水用罍沃盥用枓禮在此也疏云言禮在此者以士冠禮直言水在洗東士昏禮亦直言水在洗東鄉飲酒特牲記亦云然皆不言罍器亦不云有枓其燕禮大射雖云罍水又不言有枓故鄭云凡此等設水用罍沃盥用枓其禮具在此又少牢云上利升羊載右胖髀不升肩臂臑膊骼正脊一脡脊一橫脊一短脅一正脅一代脅一皆二骨以並腸三胃三長皆及俎拒舉肺一長終肺祭肺三皆切肩臂臑膊骼在兩端脊脅肺肩在上鄭注云凡牲體之數及載備於此疏云前體肩臂臑兩相為六後體膊骼兩相為四短脅正脅代脅兩相為六脊有三總為十九體惟不數觳二通之為二十一體二觳正祭不薦於神尸故不言是牲體之數備于此此皆因其詳而知其略可悟解經之法尸入正祭條凡舉幹舉魚舉臘舉骼舉肩皆上佐食也受加於肵者皆云佐食則是下佐食也獨舉臘則云上佐食受加於肵疑衍一上字特牲疏云主婦亞獻洗爵于房中則房中有爵又主婦獻祝及佐食訖以爵入于房後主婦致爵於主人還是房內爵愚按少牢云有司贊者取爵于篚以升授主婦贊者於房中然則特牲房內有爵少牢房內無爵注疏皆未明言其所以不同處少牢四人𧃊疏云上佐食東面近南下佐食西面近北注云一賓長在上佐食之北一賓長在下佐食之南楊氏圖因之然佐食與佐食賓長與賓長所以不得東西相當之故注疏皆無確據疏雖云以其尸東面近南今尸起上佐食居尸坐處明知位次如此然上佐食固當東面近南矣下佐食何以不得西面近南乎有司徹疏云蕡麻有實枲麻無實鄭云蕡枲實者舉其類耳若竹器圓曰簞方曰笥鄭注論語亦云簞笥亦是舉其類也又疏曰有骨為臡無骨為醢昌菹醢者即周禮麋臡臡散文亦名醢此皆是注疏活法若不知此活法則窒礙者多矣疏內用字如同時則云俱時之類則云之等如此字法今人罕用見有司徹主婦薦豆籩條又據彼決此疏內往往單用一決字如有司徹賓長獻尸條云不使兄弟不稱加爵大夫尊也者此決特牲云長兄弟為加爵又衆賓長為加爵不言獻羅一峰與陳直大書云伯恭居喪授徒子靜極以為非今日使子靜在恐亦不敢以為非也一峰言不敢以為非者想指為貧之故不得已而然者言亦古人所謂身自執事者面垢而已者也若可已而不已其能免於子靜之誚哉特牲云三獻作止爵注云賓也謂三獻者以事命之有司徹云尸作三獻之爵注云上賓所獻爵疏云不言上賓而言三獻者以其主人主婦并此賓長備三獻因號上賓為三獻是以事名官者也按三獻之疏略於特牲而詳於有司徹先後倒置經文有倒一字而意遂異者如三獻作止爵及尸作三獻之爵是也有倒一字而意仍不異者如司馬羞湆魚一司士羞一湆魚注疏並無别解是也玩儀禮節文最可想見古人從容氣象如有司徹主人獻賓條主人洗爵長賓辭此時主人即對可也必奠爵于篚興對又賓主卒爵即奠爵拜可也必執爵以興坐奠爵拜何等從容若不賓尸及皆如儐禮一作賓一作儐注疏並不詳其故有司徹主人獻賓條賓坐取祭以降西面坐委于西階西南此西面是言祭之向西非言賓西面也玩圖可見注疏不明儀禮所謂坐奠爵坐取爵坐即是跪朱子集中有跪坐拜説甚明儀禮文有意同而詳略異者如有司徹主人洗升酌獻兄弟於阼階上主人洗獻內賓於房中主人降洗升獻私人於阼階上或言洗升或言洗或言降洗升其義一也洗無有不降且升者主人為尸賓而洗則尸賓辭為兄弟內賓私人而洗則皆不辭亦是賤不得備禮之意與主人拜衆賓於門東三拜衆賓門東北面皆答一拜例同朱子遭妻喪答吕伯恭書有出謝親知之語見文集卷三十四旅酬之禮特牲與儐尸不同者特牲一人舉觶為旅酬始二人舉觶為無算爵始儐尸一人舉觶為無算爵始二人舉觶為旅酬始特牲之旅酬無算爵皆在堂下儐尸之旅酬在堂下無算爵在堂上特牲有儐弟子舉觶之事儐尸無賓弟子舉觶之事特牲之旅酬一儐尸之旅酬再特牲尸不與旅酬儐尸尸亦與旅酬此五事皆不同若賈疏言下大夫不儐尸者闕旅酬直行無算爵玩經文却不見得如此祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯國語有虞氏禘黃帝而祖顓頊郊堯而宗舜韋昭注云舜在時則宗堯舜崩而子孫宗舜説兩邉不同處最明陳澔集説取國語此條置祭法之下而不載韋氏之注豈不滋學者之惑韋昭國語注祖文王而宗武王與孝經異者周初亦祖后稷而宗文王其後更祖文王而宗武王此則似將宗字看作宗祀明堂之宗與集説劉氏注不同劉注是又劉氏欲改正經文之處亦皆有理若鄭康成云有虞氏夏后氏宜郊顓頊殷人宜郊契郊祭一帝而明堂祭五帝小德配寡大德配衆亦禮之殺也此則因鄭康成看禘郊祖宗先差故此等説皆不足據禘郊祖宗鄭注云禘謂祭昊天於圜丘也祭上帝於南郊曰郊祭五帝五神於明堂曰祖宗祖宗通言耳又郊特牲疏云九月大饗五帝則以五人帝及文武配之以文王配五天帝則謂之祖以武王配五人帝則謂之宗此亦主鄭説王肅則言禘黃帝是宗廟五年祭之名又言郊與圜丘是一郊即圜丘郊非祭感生之帝又以祖宗為祖有功宗有德其廟不毁非宗祀明堂之宗陳氏集説皆主王肅而不主康成最是祭法篇首疏云春秋命厯序炎帝號曰大庭氏傳八世合五百二十嵗黃帝一曰帝軒轅傳十世二千五百二十嵗次曰帝宣曰少昊一曰金天氏即窮桑氏傳八世五百嵗次曰顓頊即髙陽氏傳二十世三百五十嵗次是帝嚳即髙辛氏傳十世四百嵗此鄭之所據也其大戴禮少典産軒轅是為黃帝黃帝産玄囂玄囂産喬極喬極産髙辛是為帝嚳帝嚳産放勳是為帝堯黃帝産昌意昌意産髙陽是為帝顓頊顓頊産窮蟬窮蟬産敬康敬康産句芒句芒産蟜牛蟜牛産瞽瞍瞽瞍産重華是為帝舜及産象傲又顓頊産鯀鯀産文命是為禹司馬遷為史記依此而用焉皆鄭所不取又疏載張融之説云若依大戴禮及史記稷契及堯俱帝嚳之子堯有賢弟七十不用須舜舉之此不然明矣又孔子刪書求史記得黃帝玄孫帝魁之書若五帝當身相傳何得有玄孫帝魁愚按此等處皆難臆斷傳疑可也大司樂享先妣賈疏曰毛君與史記同以薑嫄帝嚳配鄭君依命厯序帝嚳傳十世乃至堯后稷為堯官則薑嫄為嚳後世妃禮書謂五帝與昊天同稱帝不與昊天同稱天是矣愚謂五帝與昊天同稱帝不與昊天同稱上帝禮書以周禮旅上帝對旅四望言之而謂上帝非一帝也是蓋參用王鄭之説恐非祭法疏云聖證論王肅六宗之説用家語之文以此四時也寒暑也日也月也星也水旱也為六宗孔注尚書亦同之伏生馬融以天地四時為六宗劉歆以乾坤之子六為六宗賈逵云天宗三日月星也地宗三河海岱也日月為陰陽宗北辰為星宗河為水宗海為澤宗岱為山宗鄭駁之云書云類於上帝禋於六宗望於山川山川言望則六宗無山川明矣大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師郊特牲曰郊之祭也大報天而主日又祭義曰郊之祭大報天而主日配以月則郊天並祭日月可知其餘星也辰也司中也司命也風師也雨師也此之謂六宗愚按鄭氏之駁諸説固未可盡據今蔡氏書傳陳氏禮記集説既主王肅而不主鄭氏則相近於坎壇一句宜依王氏讀作祖迎不宜依鄭氏讀作禳祈書經大全讀作禳祈非也蓋鄭氏因周禮大宗伯備列諸祀而不見祭四時寒暑水旱故以祭法所載為遇災祈禱之禮非關正禮而不用以解舜典故相近讀為禳祈雩宗幽宗之宗皆謂是宗字之誤蔡氏書傳引祭法不用此解也祭法廟制鄭氏注云鬼亦在祧顧逺之於無事祫乃祭之耳春秋文二年秋大事於太廟傳曰毁廟之主陳於太祖未毁廟之主皆升合食於太祖是也魯煬公者伯禽之子也至昭公定公久已為鬼而季氏禱之而立其宫則鬼之主在祧明矣此一假補經文所未及最好陳氏集説直以經文為失則過矣廟制朱子然劉歆之説而康成注王制祭法則皆以文武處七廟之內此則不可從周禮守祧疏曰孔君王肅之義二祧乃是髙祖之父髙祖之祖與親廟四皆次第而遷文武為祖宗不毁矣鄭不然者以其守祧有奄八人守七廟并薑嫄廟則足矣若益二祧則十廟奄八人何以配之愚按鄭説固非無據然奄八人此特周公時事耳安知後來不增作十人乎祭法鄭注云惟天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾疏云王制天子諸侯有禘祫故知有主王制大夫三廟一昭一穆與太祖而三太祖即是大夫之祖考既有祖考明應遷之祖以制幣昭其神而藏焉故云亦鬼其百世大夫若無祖考祗得立曾祖與祖及父二廟而已則不得鬼百世也云不禘祫無主爾者惟有百世之鬼不得禘祫無主爾左傳衛大夫孔悝有主者祭其所出之君為之王耳愚按此則古禮大夫有廟無主今家禮士大夫皆得有主者蓋以義起之也朱子答陸子夀書云先王制禮本緣人情吉凶之際其變有漸故始死全用事生之禮既卒哭祔廟然後神之然猶未忍盡變故主復于寢而以事生之禮事之至三年而遷於廟然後全以神事之也愚按此一段是喪祭之綱領蓋因子夀疑祔廟即徹几筵而發故又云遷廟一節鄭氏用穀梁練而壞廟之説杜氏用賈逵服虔説則以三年為斷其間同異得失雖未有考然榖梁但言壞舊廟不言遷新主則安知其非于練而遷舊主于三年而納新主耶竊疑杜氏之説為合于人情也愚按此一段則練而入廟朱子猶不然其説而况祔而遂徹几筵乎朱子答林黃中栗論室户云如所論室户乃在房之西偏而入室者先必由房而後進至于室矣歷考禮書不見此曲折愚按若如林説則儀禮所謂出入皆費解甚矣斷無此理鄭注曲禮大夫祭五祀則以月令五祀當之謂是殷禮注王制大夫祭五祀祭法大夫立三祀則謂皆是周禮有地者祭五無地者祭三陳氏集説則云皆未可詳此等處闕疑最是鄭注祭法七祀五祀條云此小神居人之間司察小過作譴告者爾故孔疏解司命云司命者宫中小神熊氏云非天之司命故祭于宫中皇氏云司命者文昌宫星其義非也愚按注疏此等解最精可見百神之散列于天地間大小相維上下相制至嚴至密陳氏集説謂司命見周禮似誤認祭法之司命作周禮之司命泰厲鄭注云山即厲也民惡言厲巫祝以厲山為之謬乎春秋傳曰鬼有所歸乃不為厲孔疏曰漢時祭司命行神山神門户竈等此經亦有司命門行户竈等漢時有山而無厲此有厲而無山故云山即厲也漢時人民嫌惡厲漢時巫祝之人意以厲神是厲山氏之鬼為之於理謬所以為謬者鬼之無後於是為厲厲山氏有子曰柱既有所歸不得為厲愚按即此厲字可見世俗展轉訛謬之因楚詞九歌有山鬼篇疑即是此厲然朱注却不及此堯能賞均刑法孔疏作賞均乎而刑有法解陳氏於賞字為句恐未是祭義鄭注云春禘者夏殷禮也周以禘為殷祭更名春祭曰祠孔疏謂王制云春礿夏禘周禮大宗伯春祠夏禴今云春禘故云夏殷禮案王制春曰礿此云春禘為夏殷禮者以郊特牲注禘當為礿則此春禘亦當為礿於郊特牲已注而破之故此不言也愚按時祭之名王制與周禮不同孔鄭則以為夏殷禮郊特祭義又與王制不同孔鄭則直以為誤而改之集説皆依孔鄭此等處只得用相沿舊説也祭義禘有樂而嘗無樂孔疏謂周禮四時之祭皆有樂殷則蒸嘗之祭亦有樂故那詩云庸鼓有斁萬舞有奕下云顧豫蒸嘗則殷秋冬亦有樂者熊氏云殷秋冬但有管絃之樂愚按此等處不若集説闕疑為是祭義出户而聽愾然必有聞乎其歎息之聲鄭注謂無尸者闔户若食間則有出户而聽之皇氏謂尸謖之後陽厭之時愚謂此二説似可兼用蓋有尸無尸皆有出户而聽之時也集説于此略而不注則與上文周旋出户無分别矣孝子臨尸而不怍鄭注色不和曰怍集説怍字無注則與愧怍之怍無别矣鄭解似精惟聖人為能饗帝孝子為能饗親鄭注云謂祭之能使之饗也此注最精蓋饗不饗帝親主之而我能使之必饗此即中庸大德者必受命之意集説略而不注踈矣濟濟者容也逺也漆漆者容也自反也疏云濟濟者是容貌自疏逺自反猶言自修整也凡修整之人必自反覆顧省愚按合濟濟漆漆觀之是于人不敢褻于己常顧省曲盡君子威儀之貌夫各有所當也鄭注云禮各有所當行祭宗廟者賓客濟濟漆漆主人慤而趨趨簡而明集説即用其意而筆力不同遠矣盡其慤而慤焉盡其信而信焉盡其敬而敬焉疏云盡慤謂心盡其慤也而慤焉謂外亦慤焉其信與敬皆處內內有其心外著於貌此疏解得甚精不知集説何以不用祭義夫婦齊戒沐浴盛服奉承而進之注疏本有盛服二字集説及大全本多無之未知孰是至孝近乎王至弟近乎霸言其所及之有逺近耳注疏不明白孔疏謂郊之祭大報天而主日配以月蓋天帝獨為壇其日月及天神等共為一壇故日得為衆神之主也又云祭日於壇謂春分也祭月於坎謂秋分也而崔氏還據上文郊祭之時非也愚按集説於此並不言是春秋分是亦同崔氏之説也當從孔疏為是但孔疏謂郊是夏正郊祀則因康成之誤耳日出於東月生於西注疏皆略而不解集説取方氏之解謂日出於東言其象出于天地之東也月生於西言其明生于輪郭之西也最明致物用以立民紀疏云民豐於物用則知榮辱禮節故可以立人紀也集説亦止據疏義以解然愚竊思之禮如何致物用管子曰倉廪實而知禮節衣食足而知榮辱此言有物用然後可以行禮耳禮之致物用也則如之何蓋有禮則尊卑上下有節而人不敢妄用此其所以致物用也猶孟子所謂食之以時用之以禮財不可勝用也大全以懋遷斂散解之失經意矣鬼神之名合祭義疏及左傳子産對趙簡子疏觀之然後明白祭義云氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也鄭注云氣謂噓吸出入者也耳目之聰明為魄疏云氣謂噓吸出入也者謂氣在口噓吸出入此氣之體無性識也但性識因此氣而生有氣則有識無氣則無識則識從氣生性則神出入也故人之精靈而謂之神云耳目之聰明為魄者魄體也若無耳目形體不得為聰明故云耳目聰明為魄又云鬼神本是人與物之魂魄若直名魂魄其名不尊故尊而名之為鬼神對則精靈為魂形體為魄故昭七年左傳云人生始化曰魄既生魄陽曰魂是形為魄氣為魂若散而言之魄亦性識識與魄無異故昭二十五年左傳云心之精爽是謂魂魄魂魄去之何以能久又襄二十九年左傳云天奪伯有魄又對而言之天曰神地曰祗人曰鬼散而言之通曰鬼神此皆祭義疏也左傳疏云人稟五常以生感陰陽以靈有身體之質名之曰形有噓吸之動謂之為氣形氣合而為用知力以此而強故得成為人也人之生也始變化為形形之靈者名之曰魄也既生魄矣魄內自有陽氣氣之神者名之曰魂也魂魄神靈之名本從形氣而有形氣既殊魂魄亦異附形之靈為魄附氣之神為魂也附形之靈者謂初生之時耳目心識手足運動啼呼為聲此則魄之靈也附氣之神者謂精神性識漸有所知此則附氣之神也是魄在於前而魂在于後故云既生魄陽曰魂魂魄雖俱是性靈但魄識少而魂識多鄭氏祭義注云氣謂噓吸出入者也耳目之聰明為魄是言魄附形而魂附氣也人之生也魄盛魂強及其死也形消氣滅郊特牲曰魂氣歸于天形魄歸於地以魂本附氣氣必上浮故言魂氣歸于天魄本歸形形既入土故言形魄歸於地聖王緣生事死制其祭祀存亡既異别為作名改生之魂曰神改生之魄曰鬼劉炫云人之受生形必有氣氣形相合義無先後而此云始化曰魄陽曰魂是則先形而後氣先魄而後魂魂魄之生有先後者以形有質而氣無質尋形以知氣故先魄而後魂其實並生無先後也此皆左傳疏也陳氏集説于祭義宰我問鬼神條止引中庸章句程張朱子之説不知中庸是泛言鬼神不専指祭祀之鬼神與祭義所説不同祭義五者不遂鄭注遂猶成也集説無注敬可能也安為難集説云安為難者謂非勉強矯拂之敬也孔疏云使父母安樂為難也尤妙仁者仁此者也集説亦不明白孔疏云此謂孝也言欲行仁於外必須行仁恩於父母與朱子解孟子仁之實章同父母既沒必求仁者之粟以祀之鄭注云喻貧困猶不取惡人物以祀亡親集説略不注頃步鄭注云頃當為跬聲之誤也集説止有音而無注有虞氏貴德夏后氏貴爵殷人貴富周人貴親孔疏謂夏后之世漸澆薄殷人又劣于夏周人又劣于殷此説不是集説以隨時救弊得之軍旅什伍鄭注什五士卒部曲也孔疏五人為伍二伍為什士謂甲士卒謂步卒在軍旅之中時主帥部領團曲而聚故云部曲疏得最明然團曲二字又未知作何解曲禮左右有局各司其局鄭注云局部分也孔疏云軍行須監領故主帥部分各有所司部分也又引爾雅云局分也郭云謂分部也愚按此部字與祭義部字相似祭統王后蠶于北郊以共純服疏云凡言純者其義有二一絲旁才是古之緇字二是絲旁屯是純字但書文相亂雖是緇字並皆作純鄭氏所注於絲理可知于色不明者即讀為緇即論語云今也純儉及此純服皆讀為黑色若衣色見絲文不明者讀純以為絲也愚按本䊷字而與純字相亂古人亦多淆混如此況今小學不講書法多訛讀書者安可不慎祭統君執鸞刀羞嚌鄭注嚌嚌肺祭肺之屬也疏云少牢特牲薦熟之時俎有祭肺及舉肺二肺皆嚌之故云嚌肺祭肺之屬愚按因此肺是尸所嚌而遂謂之嚌古人命名往往如此古人祭祀皆緣生人之情推之而亦有異于生人者如祭統鋪筵設同几疏云設之曰筵坐之曰席人生時形體異故夫婦别几死則魂氣同歸于此故夫婦共几又司几筵注云周禮雖合葬及同時在殯皆異几體實不同祭于廟同几精氣合祭統云知足以利之集説謂利己之得次名于下也此本孔疏悖義特甚大全葉氏以不誣其實為利之勝舊説多矣又銘者自名也注疏集説皆解得不妥愚謂是欲效法先祖以自成名之意故下文云身比焉順也祭統朱干玉戚以舞大武八佾以舞大夏注云大夏執羽籥文武之舞皆八列互言之耳疏云大夏言舞數則大武亦當有舞數大武言所執舞器則大夏亦有舞器故云互也今人講論語八佾罕知其兼大武大夏矣又公羊傳云朱干玉戚以舞大夏八佾以舞大武禮書云公羊所傳者誤也郊特牲疏云王肅以郊丘是一而鄭氏以為二者按大宗伯云蒼璧禮天典瑞又云四圭有邸以祀天是玉不同宗伯又云牲幣各放其器之色則牲用蒼也祭法又云燔柴于泰壇用騂犢是牲不同也又大司樂云凡樂圜鐘為宫黃鐘為角太簇為徵姑洗為羽冬日至於地上之圜丘奏之若樂六變則天神皆降上文云乃奏黃鐘歌大吕舞雲門以祀天神是樂不同也故鄭以蒼璧蒼犢圜鐘之等為祭圜丘所用以四圭有邸騂犢及奏黃鐘之等以為祭五帝及郊天所用愚按鄭氏郊丘之説固不可從然未知此等處王肅以何義駁之當考祭法疏云注此禘謂祭昊天於圜丘也者經傳之文稱禘非一其義各殊論語云禘自既灌及春秋禘于太廟謂宗廟之祭也喪服小記云王者禘其祖之所自出也及大傳云禮不王不禘謂祭感生之帝於南郊也以禘文既多故云此禘謂祭昊天上帝于圜丘必知此是圜丘者以禘文在于郊祭之前郊前之祭惟圜丘耳又郊特牲疏云爾雅云禘大祭也大祭莫過于圜丘故以圜丘為禘也圜丘比郊則圜丘為大祭法云禘嚳是也若以郊對五時之迎氣則郊為大故大傳云王者禘其祖之所自出故郊亦稱禘其宗廟五年一祭比每嵗常祭為大故亦稱禘也以爾雅惟云禘為大祭是文各有所對也愚按孔疏此等處附會鄭注最為支離少牢特牲士大夫之祭皆無樂然左傳衆仲論羽數曰天子八諸侯六大夫四士二未詳其故郊特牲疏云郊與配坐皆特牲故下文云養牲必養二帝牛不吉以為稷牛又召誥云用牲於郊牛二是也然祭天初有燔燎後有正祭皆須有牲故大宗伯云實柴日月星辰鄭司農云實牛柴上也鄭康成云實牲體焉郊唯特牲得供燔燎正祭二處所用者熊氏皇氏等以為分牲體供二處所用其實一特牲也而月令郊禖用大牢者彼是求子之祭不與常祭同我將祀文王于明堂經云維羊維牛者據文武配祭得用大牢也愚按此等處全賴注疏不然則郊特牲與召誥我將皆矛盾矣又疏云諸侯不敢祖天子而文三年左傳云宋祖帝乙鄭祖厲王大夫不敢祖諸侯而莊二十八年左傳云凡邑有宗廟先君之主曰都與此文不同者此據尋常諸侯大夫彼據有大功德者非注疏此等處便難解矣郊特牲疏云社稷之義先儒所解不同鄭康成之説以社為五土總神稷為原隰之神句龍以有平正水土之功配社祀之稷有播種之功配稷祀之若賈逵馬融王肅之徒以社祭句龍稷祭后稷皆人鬼也非地神故聖證論王肅難鄭云召誥用牲於郊牛二明后稷配天故知二牲也又云社于新邑牛一羊一豕一明知惟祭句龍更無配祭之人為鄭學者通之云是后稷與天尊卑既别不敢同天牲句龍是土公之神社是地祗之别尊卑不甚懸絶故云配同牲也愚按此當依疏主鄭氏説大祝言后土鄭注后土社神也賈疏曰句龍生為后土之官死則配社故舉配食人神以言社其實告社神也郊特牲云郊之用辛也周之始郊日以至孔疏云王肅用董仲舒劉向之説以此為周郊上文云郊之祭迎長日之至謂周之郊祭于建子之月而迎此冬至長日之至也而用辛者以冬至陽氣新用事故用辛也周之始郊日以至者對建寅之月又祈榖郊祭此言始者對建寅為始也鄭康成則異于王肅上文云迎長日之至自據周郊此云郊之用辛據魯禮也言郊用辛者取齊戒自新周之始郊日以至者謂魯之始郊日以冬至之月云始者對建寅之月天子郊祭魯於冬至之月初始郊祭示先有事故云始也愚按康成于郊之祭也迎長日之至也則云三王之郊一用夏正夏正建寅之月也此言迎長日者建卯而晝夜分分而日長也於郊之用辛也周之始郊日以至則云周衰禮廢儒者見周禮盡在魯因推魯禮以言周事所解與王肅絶異朱子於此則從王肅善哉集説之言曰郊祀一節先儒之論不一者有子月寅月之異有周禮魯禮之分又以郊與圜丘為二事又有祭天與祈榖為二郊今皆不復詳辨而與朱説為是孔疏又云魯之郊祭師説不同崔氏皇氏用王肅之説以魯冬至郊天至建寅之月又郊以祈榖故左傳云啓蟄而郊又云郊祀后稷以祈農事是二郊也若依鄭康成之説則異於此也魯惟一郊不與天子郊天同月轉卜三正故榖梁傳云魯以十二月下辛卜正月上辛若不從則以正月下辛卜二月上辛若不從則以二月下辛卜三月上辛若不從則止故或用建子之月郊則此云日以至及宣三年正月郊牛之口傷是也或用建寅之月則左傳云郊祀后稷以祈農事是也若杜預不信禮記不取公羊榖梁魯惟有建寅郊天及龍見而雩愚按鄭氏與王肅異杜氏又與兩家異論魯郊者只當以杜氏為主孔疏謂皇氏云天有六天嵗有八祭冬至圜丘一也夏正郊天二也五時迎氣五也通前為七也九月大饗八也雩與郊禖為祈祭不入數崔氏以雩為常祭九也愚按依此則皇氏崔氏論郊祭本主鄭説但其論魯郊則主王肅孔疏又云案聖證論王肅與馬昭之徒或云祭天用冬至之日或云用冬至之月據周禮似用冬至之日據禮記郊日用辛則冬至不恆在辛似用冬至之月鄭亦不用冬至日也愚按郊用冬至之月幾亭集中有郊期考辨最詳但當時駁之者曰二十四氣推蕩不常倘遇冬至在初旬之首則上辛定在至日之后必用是日以祭於迎陽之義何居若改用孟冬上辛又與用至月相違愚謂經文只言其常若偶有如所駁者不妨權移于孟冬之末不必曲為之説幾亭謂日至之月論節氣不論月朔則微近于鑿此所以當時抑而不行也仇滄柱云圜丘即南郊王肅已言之方丘即社則未有知之者鄭玄謂地神有二夏日至祭崑崙之神於方澤曰禘夏正祭神州地祗於北郊曰郊而社為五土之神稷為原隰之神其祭也配以句龍后稷其説固支離不經王肅雖并北郊方澤為一然以社稷之祭為句龍后稷皆人鬼非地祗則猶是岐社與方丘而二之也又取萬充宗之説謂社有二大社以祭率土之地祗王社以祭畿內之土榖大社即北郊愚按仇萬二子之言蓋即朱子所取五峰胡氏無北郊之説郊特牲於蠟祭之後曰黃衣黃冠而祭息田夫也鄭注云祭謂既蠟臘先祖五祀也於是勞農以休息之孔疏云對文蠟臘有别總言俱名蠟也故月令孟冬祈來年於天宗大割祠於公社及門閭臘先祖五祀鄭注云此周禮所謂蠟是也又云但不知臘與蠟祭相去幾日惟隋禮及今禮皆蠟之後日陳氏集説止引月令臘先祖五祀之文而不言在既蠟之後使讀者不知蠟之與臘是一是二殊欠分曉郊特牲言既蠟而收民息已故既蠟君子不興功孔疏云不興功者謂不興農功若其土功則左傳云龍見而畢務戒事也火見而致用水昏正而栽日至而畢集説並不分别農功土功殊踈略蠟也者索也嵗十二月合聚萬物而索饗之也鄭注嵗十二月周之正數謂建亥之月也集説不言是何月下引月令亦除去孟冬字殊混八蠟鄭注云先嗇一也司嗇二也農三也郵表畷四也貓虎五也坊六也水庸七也昆蟲八也孔疏云王肅分貓虎為二無昆蟲鄭數昆蟲合貓虎者昆蟲不為物害亦是其功愚按以經文考之似王説為優陳氏禮書合貓虎者去昆蟲而以百種為八蠟之一此武斷也沙隨程氏從鄭説而曰非祀昆蟲祀夫能去昆蟲者也得之庚午年十二月偶閲明人雜文識丹漆雕幾鄭注幾謂漆飾沂鄂也孔疏以丹漆雕飾之以為沂鄂查字彚圻與畿同垠與圻同此沂字疑圻字之誤哀公問車不雕幾孔疏亦云幾謂沂鄂也郊特牲云禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也大全朱子曰此蓋秦火之前典籍備具之時之語固為至論然非得其數則其義亦不可得而知矣況今亡逸之餘數之存者不能什一則尤不可以為祝史之事而忽之也愚按文獻通考序內亦引郊特牲此條而言後世之難反在於數空疏之士正不得以祝史為口實也平湖縣志曰物情簡極必繁繁極必簡自然之數孔子從先進豈真能逆障狂瀾明知汰侈極必厭若而率真聖人得氣之先遂收其權為己用耳愚按為此言者不知聖賢維持世運之道夫簡極而繁繁極而簡雖自然之運然待其極而反之與未極而反之者有辨待其極而聽其自反或至於矯枉過正與挽之使反惟欲其得中而止者又有辨孰謂孔子之從先進止是任狂瀾之自轉哉狂瀾之不反可憂狂瀾之自反更可憂聖人不違時亦不隨時經綸之妙豈鄉曲鄙儒所知郊特牲孔疏云虞氏尚氣殷人尚聲周人尚臭皆謂四時常祭也若其大祭祫周人仍先用樂也故大司樂云若樂九變則人鬼可得而禮矣鄭云先奏六樂以致其神而後祼焉推此言之虞氏大祭亦先作樂也故鄭注大司樂引虞書云戛擊鳴球搏拊琴瑟以詠祖考來格簫韶九成鳳凰來儀此宗廟九奏之節此虞氏大祭與周同樂九奏夏殷大祭雖無文或當與周同熊氏以為殷人先求諸陽謂合樂在灌前周人先求諸陰謂合樂在灌後與降神之樂别愚按集説於此並不分别時祭祫祭則與周禮混矣祊有二所謂索祭祝於祊孔疏謂是正祭日祊也集説則兼正祭繹祭之祊言然玩上下文皆是據正祭言則孔疏為長祭齊加明水鄭注云五齊加明水則三酒加玄酒也疏云此云玄酒對明水直謂水也若總而言之明水亦名玄酒故禮運云玄酒在室及司烜注云明水以為玄酒是也愚按古人用字不可執一如此讀禮志疑卷二
