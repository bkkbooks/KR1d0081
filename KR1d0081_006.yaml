body:
  text: 讀禮志疑巻六贈内閣學士陸隴其撰昔者周公朝諸侯于明堂之位天子負斧依南鄉而立鄭注云周公攝王位以明堂之禮儀朝諸侯也不于宗廟辟王也天子周公也此最謬處集説非之是矣孔疏又載鄭發墨守云隠為攝位周公為攝政雖俱相幼君攝政與攝位異也愚按此則鄭又自相矛盾矣又鄭于大誥王若曰亦云王謂周公居攝命大事則權稱王也孔疏于書主安國傳故極言鄭之非于禮記主鄭義故不駁孔疏謂王肅以家語之文武王崩成王年十三鄭康成用衛宏之説武王崩時成王年十歳與王肅異也愚按此等處總難稽考又書孔傳亦云武王崩成王年十三三公中階之上疏云南面三階故稱中愚按他經未見中階之名諸莊甫云中階是秦制似可信明堂位車旂爵勺或用三代或用四代集説不言其何故孔疏云隨其禮存者而用之耳無别義也最明少儀云不疑在躬鄭注謂不服行所不知使身疑也較集説似明母身質言語及曲禮疑事毋質即此意玉藻謂童子見先生從人而入少儀謂童子曰聽事此最足見古人長幼之節事君者量而後入不入而後量集説就出處言鄭注謂量量其事意合成否是就逐事言愚按似當兼用母循枉集説云言行過而邪枉當改以從直後復循襲是貳過矣愚按以此推顔子之不貳過可見過之貳有由于錮蔽者有由于因循者少儀酌尸之僕如君之僕其在車則左執轡右受爵祭左右軌范乃飲集説止云軌轂末也范軾前也鄭孔注疏則引周禮大御祭兩軹祭軌邶風濟盈不濡軌究其同異又如犬則執緤條則引曲禮効犬者左牽之此等處是注疏所長學記術有序鄭注云術當作遂孔疏解之甚詳集説謂當作州者非中年考校一條大全臨川呉氏講得最明愚按論語洒掃應對進退是小學之行學記離經辨志敬業樂羣博習親師論學取友是小學之知又離經幾句俱在則以學文中孔疏謂應入大學者自國家考校之其未入大學者鄉遂大夫考校也不見分小學大學似與臨川呉氏之説不同集説則並不言何人考校何處考校尤混至近来講家有所謂説約者則又云入學比校俱指大學言與呉氏之説全背未卜禘不視學孔疏謂若不當禘祭之年亦待時祭之後乃視學也集説謂不五年不視學則拘泥甚矣又孔疏謂此視學謂考試學者經業或君親往或使有司為之非天子大禮視學也若大禮視學在仲春仲秋及季春集説亦不能如此之詳多其訊言及于數集説云多發問辭以訊問學者而所言又不止一端孔疏云多其訊者訊問難也旣自不曉義理而外不肯黙然故假作問難若已解之也言及于數者數謂法象旣不解義理若有所言而輙詐稱有法象也猶若一則稱配太一二則稱配二儀但本義不然浪為配當此解勝集説呻其佔畢一節皆是與時教必有正業相反而退息之居學其有無不必言矣集説謂使人不由其誠教人不盡其材則與退息必有居學者異恐非雖終其業其去之必速鄭注謂學不心解則忘之易此解得最明集説以工夫間斷言之亦非相觀而善之謂摩鄭注云不並問則教者思専也孔疏云善猶解也受學之法若人人競問則師思不專故令弟子共推長者能者一人諮問餘小不能者但觀聽長者之問荅而各得知解此朋友琢磨之益故謂之摩也愚按集説大全俱不用此解然此解自精論語孔門七十子親承問答者極少想亦由此注疏謂或失則多謂才識淺小而所學貪多終無所成者或失則寡是才識深大而所學務寡終存狹局者或失則易是汎濫外問學而不思則罔者或失則止是不肯諮問思而不學則殆者此解亦勝集説樂記動静有常小大殊矣鄭注云動静隂陽用事大小萬物也大者常存小者隨陽出入愚按此解與集説不同然中庸大徳小徳之義恐是如此天地之情也疏引皇氏云天地無情以人心謂之耳愚按西山讀書記論天地無心有心最詳恐不可一槩説樂記言禮樂處雖多集説劉氏云始也法隂陽以為禮樂終也以禮樂而贊隂陽此二語足以括之以樂記之禮樂與太極圖之仁義禮智對看則樂記之樂兼得太極圖之仁樂記之禮兼得太極圖之禮義智然黄氏日抄則云春作夏長元亨之仁也仁主仁愛樂主和同故仁近于樂秋斂冬藏利貞之義也義主斷制澧主限節故義近于禮依此則樂記之樂乃是太極圖之仁禮樂記之禮乃是太極圖之義智此亦似可從玩集説亦是黄氏之意昔者舜作五弦之琴以歌南風鄭注云其辭未聞孔疏云聖證論引尸子及家語難鄭云昔者舜彈五弦之琴其辭曰南風之薫兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮鄭云其辭未聞失其義也馬昭云家語王肅所増加非鄭所見又尸子雜説不可取證聖經故言未聞也愚按鄭氏不取雜説證經可謂謹嚴王肅駁之非也黄氏日抄亦載南風之辭失鄭氏之意集説石梁王氏曰䕫制樂豈専為賞諸侯此處皆無義理愚按此非謂䕫之樂皆為賞諸侯設也特歌此南風以賞諸侯耳於理無礙孔疏自明其治民勞者其舞行綴逺其治民逸者其舞行綴短鄭注云民勞則徳薄酇相去逺舞人少也民逸則徳盛酇相去近舞人多也孔疏云綴謂酇也酇謂酇聚舞人行位之處立表酇以識之黄氏日抄亦主此解集説乃以行綴逺為徳隆樂盛行綴短為徳薄樂殺與注疏相反似只宜從注疏大章章之也咸池備矣孔疏云黄帝所作咸池之樂至堯更増改修治而用之黄帝之樂堯不増修者則别立其名則此大章是也咸池至周謂之大咸大章至周謂之大巻更加以雲門之號雲門大巻一也愚按此皆是據周禮以解禮記集説皆不暇及黄氏日抄云五帝之不相沿樂以樂乆而不變将極而失其和則憂也三王之不相襲禮以禮乆而不修将粗而失其中則偏也愚按此説似妙然注疏集説皆不如此解樂言一章孔疏謂樂出于人而還感人猶如雨出于山而還雨山火出于木而還燔木愚按此數語最明白集説不如也廣則容姦狹則思欲注疏以樂言集説以人之感于樂者言恐當從注疏情深而文明氣盛而化神和順積中而英華發外孔疏及大全嚴陵方氏皆主樂言集説獨将氣盛化神句主天地言集説誤文采節奏四字黄氏日抄云文采謂威儀節謂樂止奏謂樂終也最明先鼓以警衆三步以見方此初之節奏也再始以著往復亂以飭歸此繼之節奏也故前又云廣其節奏樂也者情之不可變者也禮也者理之不可易者也此二句當與五帝不相沿樂三王不相襲禮同看盖不可變不可易者禮樂之初定者也不相沿不相襲者禮樂之積弊者也徳成而上藝成而下當與論語游于藝及籩豆之事則有司存同看君子于是語于是道古言古樂之妙君子聽之不覺其闡明而率循之故非此不語非此不道豈有厭倦之理蓋所以破文侯恐卧之言也集説不明白集説云三綱者君為臣綱父為子綱夫為妻綱六紀謂諸父有善諸舅有義族人有序昆弟有親師長有尊朋友有舊此本孔疏又本禮緯含文嘉盖緯雖不可盡信然聖賢精意亦時有藉之以傳如此之類者故康成往往以緯證經未可以此詆康成也衛音趨數齊音傲辟孔疏謂淫泆之外更有趨數傲辟故總謂之溺音此解亦勝集説遲之遲而又乆黄氏日抄載方氏之説曰上遲字音穉待也待諸侯之至也下遲字如本音謂遲而又乆則遲之至也此解甚妙集説畧而不言樂記一則曰禮勝則離樂勝則流是禮樂皆不可過也一則曰禮主其減樂主其盈是禮則懼其不足樂則懼其有餘也二條互相發明集説劉氏以謙卑退讓為減以減而不進為禮勝則離此另是一解與孔疏及馬氏註俱不同不可從聲音動静性術之變盡于此矣孔疏云術謂道路變謂變動言口為聲音貌為動静是人性道路之變轉竭盡於此矣而不可過也愚按此解性術二字最精集説欠明曲直繁瘠廉肉節奏此八个字作文之法亦盡于此審一以定和集説應氏劉氏兩條不同劉氏與鄭孔注疏同應氏所謂一者心也恐不免有良知家之弊子貢問樂一條孔鄭雖考正其倒錯而仍存其舊以示傳疑之意集説竟沒其舊非先儒注書之體也歌者直已而陳徳者也直即直養無害之直直己者正直己身自反無愧正所謂徳于未歌之前實有此徳恐其雖得而復失故将諸詩敷陳以涵養保全之觀下文云有勇有義非歌孰能保此其意可見集説方氏一條以各濟所偏為解非經意也注疏皆不如此解經解第一條言六經之教所得有淺深因而不能無失其義甚精集説石梁王氏謂此決非孔子之言殊誤天子者與天地參故徳配天地兼利萬物與日月並明明照四海而不遺㣲小今講家以此一叚為徳盛其在朝廷則道仁聖禮義之序燕處則聽雅頌之音行步則有環佩之聲升車則有鸞和之音居處有禮進退有度講家以此一叚為養純盖徳已盛而猶不敢以自足者自朝廷以至進退一步密一歩涵養之功又如此此所以大法小亷而百官得其宜綱舉目張而萬事得其序也注疏集説大全皆不能如此明白于此可悟日新又新之分哀公問有成事然後治其雕鏤文章黼黻以嗣此言雕鏤文章黼黻在有成事之後亦猶師乙之言歌在有勇有義之後也仲尼燕居云言而履之禮也行而樂之樂也集説無解今講家云言非空言行非强勉正明禮樂之意其中自有序和在甚明達於禮而不達於樂謂之素達於樂而不達于禮謂之偏集説解得不明孔疏云古與今異古之人也明達于禮而不甚明達于樂者但謂之樸素不備具耳不得稱於樂為窮明達于樂而不甚明達於禮者謂之徧半而不備耳非是於禮為窮䕫禮樂兼有但樂優于禮若今人達于樂而不達于禮者則全不知禮也此解分明聖人論治必説到無以復加必説到過化存神必説到循序漸進五至言無以復加也三無言過化存神也五起言循序漸進也五起自内及外自近及逺始起于心旣得於身徴于人臻于天又終而至於悠久統言之曰禮樂分言之曰三曰五盖志也詩也哀也皆從禮樂中分出言之耳故三無五至猶言禮樂極其至而妙於無耳古人文字多變换故費後人解説三無五至即虞所謂惟康四方有敗必先知之又即虞書所謂惟幾地載神氣神氣風霆黄氏日抄曰神氣散而為風薄而為霆皆從地起故屬之地盖聞有天雨有雷雨天雨逺雷雨近此章以風雨屬天以風霆屬地其審之矣世有風雷大作而髙山絶頂晴皎自如者非風霆即地之神氣之為耶愚按日抄之意盖以風之在天與在地者各不同也注疏集説大全俱不若此之明白耆欲将至有開必先黄氏日抄云耆欲謂所可願之事祭統載衛悝鼎銘亦曰乃考文叔興舊耆欲晦庵據家語云有物将至其兆必先疑有物訛為耆欲其兆訛為有開愚按朱子之疑雖是然依鄭注及集説解自好不必改維嶽降神生甫及申孔疏云鄭志注禮在先未得毛詩傳故以甫為仲山甫在後箋詩乃得毛傳知甫侯申伯同出伯夷之後故與禮别也愚按一人之解不能不因前後而異同如此讀者何可不審又坊記引先君之思以畜寡人鄭注作定姜之詩亦與詩註不同孔疏亦引鄭志云註記時執就盧君後得毛傳乃改之凡註與詩不同皆倣此坊記引君陳鄭註云君陳盖周公之子伯禽弟也孔疏並不言其何據止以蔡仲之命序例之謂其相似恐終難信表記以徳報怨則寛身之仁也以怨報徳則形戮之民也孔疏云以直報怨是禮之常也今以徳報怨但是寛愛己身之民欲苟息禍患非禮之正也愚按此段如孔疏之解自無病不知集説何以疑其非孔子之言道有至有義有考義字上本無有字鄭注謂是闕文集説即増之而不註明其故與仁同功其仁未可知也與仁同過然後其仁可知也孔疏云過謂利之與害若遭遇利害之事其行仁之情則可知也愚按孔疏解此過字最明盖與論語觀過知仁之意自不同集説吕氏及大全嚴陵方氏以論語之意解此誤矣仁有數義有長短小大鄭注云數與長短小大互言之耳集説欠明凱以强教之弟以説安之孔疏云凱樂也言君子初以仁政化下使人樂仰自强不息是凱以强教之黄氏日抄引吕氏曰凱樂也此以為强教者和樂之中又有强盛之狀凱風長養之風也凱樂戰勝之樂也八凱性和而有才者也皆有强盛意此皆可與集説相發明孔疏謂虞夏之文不勝其質者言虞夏之時雖有其文但文少而質多故文不勝于質殷周之質不勝其文者言殷周雖有其質亦質少而文多故不勝其文然按三正記云文質再而復始則虞質夏文殷質周文而云虞夏之質殷周之文者夏家雖文比殷周之文猶質殷家雖質比夏家之質猶文愚按虞夏之質殷周之文與夏忠商質周文之説可相通與三正記之説恐不相類又按夏道尊命一條即夏忠商質周文之説也取石梁王氏之説曰此一章未敢信以為孔子之言恐亦難一槩不信事君逺而諫則讇也孔疏云若與君疏逺强欲諌諍則是謟侫之人望欲自達也愚按此意甚正石梁王氏謂此非孔子之言過矣又孔疏云凡諫者若常諫之時天子諍臣七人諸侯五人大夫三人唯大臣得諫若嵗初則貴賤皆得諫也故襄十四年左傳師曠對晉侯云自王以下各有父兄子弟以補察其政史為書瞽為詩工誦箴諫大夫規誨士傳言庶人謗商旅于市百工獻藝國語又云天子聽政公卿至于列士獻詩瞽獻典史獻書師箴瞍賦矇誦百工諌庶人傳語近臣盡規此皆孟春之月上下皆諫故傳引夏書曰毎歳孟春遒人以木鐸狥于路是也愚按此又可見逺臣之諫常有時侯表記事天地之神明無非卜筮之用不敢以其私䙝事上帝熊氏訓解以此二句専就所用之牲言可免劉註牴牾之疑緇衣王言如絲其出如綸王言如綸其出如綍黄氏日抄云綸繩也大於絲綍索也又大于綸言王言一出下所視效其端雖㣲其末漸大甚明集説不詳緇衣言甫刑苗民孔疏曰鄭注吕刑云苗民謂九黎之君也九黎之君於少昊氏衰而棄善道上效蚩尤重刑必變九黎言苗民者有苗九黎之後顓頊代少昊誅九黎分流其子孫為居于西裔者三苗至髙辛之衰又復九黎之君惡堯興又誅之堯末又在朝舜時又竄之後王深惡此族三生凶惡故著其氏而謂之民以此言之鄭以九黎為苗民先祖但上學蚩尤之惡非蚩尤子孫孔註尚書以為九黎即蚩尤也三苗則非九黎之子孫與鄭異愚按此叙三苗之始末最詳深衣續衽鉤邊鄭注云績猶屬也袵在裳旁者也屬連之不殊裳前後也鉤邊若今曲裾也孔疏云衽當旁者凡深衣之裳十二幅皆寛頭在下狹頭在上皆似下要之衽是前後左右皆有衽也今云衽當旁者謂所續之衽當身之一旁非為餘衽悉當旁也云屬連之不殊裳前後者若其喪服其裳前三幅後四幅各自為之不相連也今深衣裳一旁則連之相著一旁則有曲裾掩之與相連無異故云屬連之不殊裳前後也愚按如孔疏之言則集説楊氏以覆縫為鉤邊恐未然大全嚴陵方氏曰衽襟也亦恐小異儒行云其過失可微辨而不可面數也鄭注孔疏皆無解集説吕氏云此一句尚氣好勝之言於義理未合近世講家則云不可面數微辨即改不待面數也此正勇于改過處愚按此説勝于吕氏孔疏云孔子説儒凡十七條其上十五條皆明賢人之儒其第十六條明聖人之儒其十七條之儒是夫子自謂也愚按原本鄭注最明集説殊欠明白毁方而瓦合鄭注云去已之大圭角下與衆人小合也孔疏云方謂物之方正有圭角鋒鋩也瓦合謂瓦器破而相合也又云圭角謂圭之鋒鋩有楞角言儒者身恒方正若物有圭角不欲異衆過甚去其大圭角言猶有小圭角也黄氏日抄云毁方毁去其圭角瓦合委曲相合如瓦之覆屋也愚按此皆主涵容言與後所謂砥礪亷隅者不同集説所解殊迂滯麤而翹之又不急為也孔疏云麤疏也翹起發也甚明集説亦不明孔疏云儒之言優也柔也能安人能服人愚按儒之徳兼剛柔而要以柔為本孔疏此解精矣沮之以兵世亂弗沮沮字集説無解鄭注云沮謂恐怖之也孔疏云俗本沮或為阻字謂阻難之事愚按沮與阻是二字不得混陸徳明經典釋文云沮在吕反冠義三加彌尊孔疏士禮故三加也古者五十而後爵故大夫無冠禮諸侯則四加而有𤣥冕也天子當五加衮冕也集説不明昏義孔疏云納采問名此二禮一使而兼行之納吉納徵請期毎一事而使者一人行惟納徵無鴈以有幣故其餘皆用鴈愚按今多用幣者矣此昏禮之失也鄉飲酒義孔疏云此篇前後凡有四事一則三年賔賢能二則鄉大夫飲國中賢者三則州長習射飲酒也四則黨正蜡祭飲酒總而言之皆謂鄉飲酒知此篇合有四事者以鄭注鄉人鄉大夫又云士州長黨正鄭又云君子謂鄉大夫士也鄉大夫士飲國中賢者亦用此禮也鄭以此經云鄉人士君子故知此篇有四事鄉則三年一飲州則一年再飲黨則一年一飲也愚按今人認鄉飲専為養老之事失其義矣賔主象天地介僎象隂陽孔疏云天地則隂陽著成為天地故賔在西北天地嚴凝之氣著主在東南天地温厚之氣著介坐在西南象隂之㣲氣僎在東北象陽之微氣此一段看得隂陽最分明立賔以象天而坐則於西北隂位立主以象地而坐則于東南陽位分明是先天後地之理射義孔疏云凡天子諸侯及卿大夫禮射有三一為大射是将祭擇士之射二為賔射諸侯来朝天子入而與之射也或諸侯相朝而與之射也三為燕射謂息燕而與之射其天子諸侯大夫三射皆具其士無大射此三射之外又有鄉射鄉大夫職云獻賢能之書於王退而以鄉射之禮五物詢衆庶是也又有州長射于州序之禮又有主皮之射愚按此一條言射之類最詳為人父者以為父鵠孔疏云中則任為人父不中則不任為人父故為人之父者以為父鵠以下放此愚按此説得最明盖當時以射習人于禮樂故視射之鵠如已之道猶今之以經義習人也集説不分明燕義云凡國之政事國子存游卒孔疏謂游卒未仕者也師氏職云凡國之貴游子弟學焉鄭注云貴游子弟王公之子弟游無官司者則此游卒是游逸以為副倅故云未仕者國之尋常小小之政事不與于國子唯民庶所為國子存游卒未仕者之中愚按有國子又有游卒猶書有三宅又有三俊皆儲以為他日之用者也真西山龍王祠記曰壇而禜之可也廟而祠之亦可也古今異宜豈必皆同愚按龍而廟祀之終不如古禮之善羣經音辨中引經往往與今本不同如書曰雨曰濟絫大徳之類大約今本皆唐天寳三年詔尚書古體文字勒依今文孔頴達正義雖在天寳前然經當時改定羣經音義是本陸氏經典釋文故猶存古字漢孔氏尚書序云古者伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉疏云尚書緯及孝經䜟皆云三皇無文字此不同者藝文志曰仲尼沒而微言絶七十子喪而大義乖况遭秦焚書之後羣言競出其緯文鄙近不出聖人前賢共疑有所不取通人考正偽起哀平則孔君之時未有此緯何可引以為難乎愚按世多咎孔疏之引䜟緯觀此條則其胸中涇渭自分其引之者亦是擇其近理者取之似未可深罪也若何休之解公羊妄言孔子受端門之命則真為侮聖言矣公羊傳序疏云何氏作墨守廢疾膏盲盖在注傳之前猶鄭君作六藝論訖然後注書愚按此可想見古人著作之次第家禮陳冠服條下注云有官者公服無官者襴衫性理載程子曰今行冠禮若制古服而冠冠了又不常著却是偽也必須用時之服至昏禮則朱子曰昏禮用命服乃是古禮如士乗墨車而執㕍皆大夫之禮也冠帶只是燕服非所以重正昏禮也不若從古之為正黄氏瑞節曰士昏禮謂之攝盛盖以士而服大夫之服乗大夫之車則當執大夫之執也按昏禮冠禮却是兩様意思鄭康成注周禮膳夫醤字云醤謂醯醢賈疏云醤是總名按此則知古所謂醤絶非今所謂醤經典釋文一書本自單行後人强以合于注疏往往有與注疏牴牾處如周禮司裘注糝字豻字陸氏音釋却作參字干字齎字鄭司農云齎或謂資鄭注外府曰行道之財用也注掌皮則曰予人以物曰齎賈疏謂齎有兩義周禮閽人掌守王宫之中門之禁鄭司農以庫門為中門鄭康成以雉門為中門賈疏發明康成之意最詳蔡九峯注康王之誥却仍主司農之説何也鄭康成注周禮追師副字曰若今步繇賈疏云漢之步繇謂在首之時行步摇動此據時目驗以曉古至今去漢久逺亦無以知之矣又注編曰若今假紒疏云亦是鄭之目驗以曉古至今亦不知其狀也愚按此可見事有不必曲為之説者大抵闕疑有二樣一是我不能驟通而當闕以俟之一是事本不可通而當闕而置之康成澤虞注曰澤水所鍾也水希曰藪愚按藪便是變成平之漸鄭注周公所測之地中在今潁川陽城疏云周公度景之處古跡猶存卒都洛邑不在頴川地中者欲取河洛之閒形勝之所洛都雖不在地之正中頴川地中却仍在畿内愚按此可見古人人建事雖考之天道必以人事為主大司徒文日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂此是以地中為準而較其四面之長短與冬至景長夏至景短之長短又不同與日極南至牽牛極北至東井之南北亦不同鄭注云日南是地于日為近南也日北是地於日為近北也最明賈疏五表之説亦甚詳又按觀此則里差之法自古有之堯典羲和分驗四方亦是如此小司徒伍兩卒旅之制鄭注止云此皆先王所因農事而定軍令者也却不引管子内政軍令之文盖不欲合王伯而一之也賈疏引管子語以實之失其意矣小司徒九夫為井鄭注云方一里九夫所治之田也賈疏云一井之内地有九夫假令盡是上地不易家有百畝中一夫入于公四畔八夫家治百畝尚無九夫所治况其中或有一易再易所取數更少令鄭云方一里九夫所治之田鄭據地有九夫而言非謂有九家也愚按觀此則井田内自有活法而後人紛紛疑之者過矣又載師注疏亦可見其為活法見别本封人歌舞牲鄭注云謂君牽牲入時隨歌舞之言其肥香以歆神也愚按此可見古人感神之法無所不至據左氏莊二十五年傳則惟正陽之月有救日食之法而尚書季秋日食救之者賈疏謂上代之禮不與周同然則鼓人職救日月則詔王鼓而春秋記日食不記月食聖人用意亦有不必盡同者歟老子謂道可道非常道又云上徳不徳是以有徳下徳不失徳是以無徳又失道而後徳失徳而後仁失仁而後義失義而後禮賈疏以師氏至徳與老子常道及上徳不徳為一是燧皇已上無名號之君所行以敏徳與老子可道之道及下徳不失徳失道而後徳為一是三皇五帝所行以孝徳與失徳而後仁失仁而後義失義而後禮為三王所行又以仁義為五帝三王所同有唐初儒者猶崇信老莊往往引以解經而不辨其與儒家同異處此其所以為陋也仇讐調人疏云仇是怨也讐謂報也又云漢時徐州刺史荀文若問𤣥周禮父之讐辟之海外今青州人讐在遼東可以王法縱不討乎當問之時𤣥己年老昏耄意忘九夷八蠻六戎五狄謂之四海愚按此疏辨仇讐海字之義好媒氏云男三十而娶女二十而嫁康成據易參天兩地之義則謂必三十二十然後可嫁娶王肅據家語之文則謂言其極不是過耳王説似近情然古今風俗不同則鄭説亦未可盡非委人職云凡疏材木材注疏皆只解疏材不解木材木材二字疑有誤不當在此土均職有禮俗二字康成謂是先王舊禮賈疏云俗者續也愚按有禮俗有俗禮禮俗不可變故曲禮云君子行禮不求變俗而康叔封衛亦因殷舊俗禮則不可狥然鄭注于誦訓之方慝亦因曲禮此語疏云土均是謂先王舊俗此謂不變其鄉俗然則俗禮亦未可輕變歟草人注云土化之法化之使美若汜勝之術也疏云漢時農書有數家汜勝為上故月令註亦引汜勝愚按注疏並不言汜勝是人名是書名齊民要術内亦止稱汜勝之書曰俱欠明大宗伯言社稷而不言方澤注疏謂是舉社以表地此與中庸言郊社一例又如賈疏解朝宗覲遇云四方諸侯来朝覲天子豈有别意乎各舉一邊互見為義耳按古人文法往往如此九命作伯鄭注曰得征五侯九伯者賈疏曰左傳五侯九伯汝實征之賈服云五等諸侯九州之伯若然與天子何殊而為夾輔乎故鄭以為五侯者九州有九牧牧即侯但二伯共分各得四侯半侯不可分故二伯皆言五侯也言九伯者九州有十八伯各得九伯故云九伯也愚按鄭説勝賈服然杜注却不從鄭鄭注蒼璧禮天黄琮禮地云此禮天以冬至謂天皇大帝在北極者也禮地以夏至謂神在崑崙者也愚按漢儒解上帝后土必言其居之所在此雖未必然然亦不可不存其説又鄭云禮東方以立春謂蒼精之帝而太昊勾萌食焉禮南方以立夏謂赤精之帝而炎帝祝融食焉禮西方以立秋謂白精之帝而少昊蓐收食焉禮北方以立冬謂黒精之帝而顓頊𤣥冥食焉賈疏云必知迎氣亦有五人帝五人神者以其自外至者無主不止故皆以人帝人神為配也愚按此亦可謂達鬼神之情狀大宗伯疏謂禮無祭海之文故鄭司農以日月星海解四望而後鄭不從可見先儒議禮必不肯為無據之言小宗伯疏曰何休云質家右宗廟尚親親文家右社稷尚尊尊若然周人右社稷者地道尊右故社稷在右是尚尊尊之義愚按此可見古禮之不同肆師職注云逺郊百里近郊五十里疏云逺郊百里者司馬法文知近郊五十里者按尚書君陳序云分正東郊成周鄭彼注云成周在近郊五十里案今河南洛陽相去則然以其漢法于王城置河南縣於成周置洛陽縣相去見五十里是近郊五十里故云東郊也愚按此已見載師但此更詳此等疏當合在一處肆師職云封于大神鄭注云封謂壇也愚意封禪之封即此意康成注表貉云其神盖蚩尤或曰黄帝然則康成已不知其為何神祭者如何盡誠曰但知其為造兵之人而已不知其為何人亦可也肆師表貉疏云爾雅云是類是禡故知貉為師祭也疑有誤鬱人疏曰王度記云天子以鬯諸侯以薫大夫以蘭芝士以蕭庶人以艾此等皆以和酒諸侯以薫謂未得圭瓚之賜得賜則以鬱耳愚按先王以香氣求神而又有差等如此又疏曰王度記云天子以鬯禮緯云鬯草生庭皆是鬱金之草以其和鬯酒因號為鬯草也愚按此又可見名之變鬯人掌共秬鬯鄭注云秬鬯不和鬱者又云卣中尊謂獻象之屬尊者彝為上罍為下疏云獻云獻象之屬在其中故云中尊愚按今蔡𫝊洛誥秬鬯却以鬱金解之此是本禮緯説若依康成説則鬯屬鬯人不用鬱又酒正疏云鬯人所造鬯酒者自用黒黍為之與五齊三酒别也要查王制賜鬯曲禮下摯天子鬯注疏鄭注鬯人引檀弓曰臨諸侯畛于鬼神曰有天王某父疏云此亦下曲禮文言檀弓者誤愚按康成引經猶有誤處甚矣讀書之難也司尊彝注云變朝踐為朝獻者尊相因也變再獻為饋獻者亦尊相因愚按祭禮有祼有朝踐饋獻酳尸酳尸即饋食之禮也朝獻者即王之酳尸也再獻者即后及賔之酳尸也此經于春夏則言朝踐再獻于秋冬則言朝獻饋獻是省文互文之法冡人先王之葬居中以昭穆為左右鄭注云先王造塋者昭居左穆居右夾處東西賈疏云若文王在豐葬于畢子孫皆就而葬之即以文王居中則武王為昭居左成王為穆居右康王為昭居左昭王為穆居右已下皆然至平王東遷死葬即又是造塋者子孫據昭穆夾處東西若兄死弟及俱為君則以兄弟為昭穆以其弟已為臣臣子一列則如父子故别昭穆也必知義然者按文二年秋八月大事于太廟躋僖公謂以惠公當昭隠公為穆桓公為昭莊公為穆閔公為昭僖公為穆今升僖公於閔公之上為昭閔公為穆故云逆祀也知不以兄弟同昭位升僖公于閔公之上為逆祀者案定公八年經云從祀先公傳曰順祀先公而祈焉若本同倫以僖公升于閔公之上則以後諸公昭穆不亂何因至定八年始云順祀乎愚按閔昭僖穆僖昭閔穆順逆只在二公若文公則坐定是昭矣以後諸公昭穆何由而亂賈疏此條殊不可解大司樂奏黄鐘歌大吕疏云欲作樂先擊此二者之鐘以均諸樂是以鐘師云以鐘鼓奏九夏鄭云先撃鐘次擊鼓論語亦云始作翕如也鄭云始作謂金奏是凡樂皆先奏鐘以均諸樂也愚按據此則樂以律為本八音之律又以鐘為本鐘之律定而後八音之律可定也故鄭又引伶州鳩之言曰律所以立均出度古之神瞽考中聲而量之以制度律均鐘大司樂圜鐘為宫條鄭注云先奏是樂以致其神禮之以玉而祼焉賈疏謂據小宰注天地大神至尊不祼又玉人典瑞宗伯等不見有宗廟禮神之玉此言玉止據天地言祼止據宗廟愚按依此則書言植璧秉圭只是變禮圜鐘為宫一條不用隔八相生之正法鄭注有避有不用之説不知果合當時之意否存其説而闕疑可也又鄭注云凡五聲宫之所生濁者為角清者為徵羽賈疏曰或先生後用或後生先用又鄭注云云此樂無商者祭尚柔商堅剛也愚按此則言律吕者所當知大司樂四鎮五嶽賈疏曰爾雅霍山為南嶽尚書及王制注皆以衡山為南嶽郭璞注云霍山今在廬江潜縣别名天柱山武帝以衡山遼逺因䜟緯皆以霍山為南嶽故移其神於此如郭此言則武帝在爾雅前乎愚按此亦當闕疑樂師舞先鄭云宗廟以羽後鄭云宗廟以人然春秋初獻六羽不知後鄭如何解大師賈疏謂康成律取妻而吕生子之義皆本律歴志可見讀經不可不知史典同賈疏謂鬼谷子有飛鉗揣摩之篇皆言從横辨説之術飛鉗者言察是非語飛而鉗持之揣摩者言揣人主之情而摩近之愚按四字説盡從横人肺肝鞮鞻氏掌四夷之樂與其聲歌鄭注曰言與其聲歌則云樂者主於舞疏曰凡樂止有聲歌及舞旣下别云聲歌明上云樂主於舞可知也愚觀此則論語言樂正又言雅頌得所樂自樂雅頌自雅頌可知朱註以詩樂並言此不易之論也説者因鄭夾漈言詩者用以歌而非用以説義遂謂雅頌即是樂此亦拘矣不知夾漈之言本偏謂詩用以歌可也謂非以説義則不可虞書言詩言志歌永言聲依永律和聲律生于詩者也如鄭此言則詩反生于律矣且如夾漈説則興于詩成于樂亦将合而為一乎又有因夾漈之説遂謂孔子有正樂之功無刪詩之事者其誣抑甚矣此特見延陵觀樂時雅頌具在詩未嘗亂無待刪然則延陵觀樂之時樂亦何嘗亂乎要之今日詩樂舊本旣亡故不見夫子刪正之妙若使無夫子刪正則詩樂僅足動賢者之觀聽豈足為萬世之凖繩乎延陵之嘆樂猶之韓起之歎春秋耳籥章云豳詩豳雅豳頌鄭注云吹之者以籥為之聲愚按此是舉詩以見樂大司樂奏黄鐘歌大吕此是舉樂以見詩大卜云其經兆之體皆百有二十其頌皆千有二百鄭注云頌謂繇也疏云繇之説兆若易之説卦故名占兆之書曰繇愚按今人不知繇為何義以易比例最明卜師四兆鄭注謂占兆之書分為四部若易之二篇其云方功義弓之名未聞愚按卜筮一理而龜書獨不傳聖人贊易之功豈不大哉大祝掌六祈以同鬼神示鄭注天神人鬼地示不和則六厲作見故以祈禮同之愚按此等皆是明于鬼神之情狀處男巫有冬堂贈之文注謂歳終以禮送不祥愚按此與方相逐疫相為表裏剛柔並用之道也先王之於鬼神一以人道推之女巫凡邦之大烖歌哭而請注云有歌者有哭者冀以悲哀感神靈也疏引論語哭而不歌為難而以喪家輓歌解之謂是憂愁之歌非以樂而歌然不言喪家輓歌于何時馮相氏言冬夏致日春秋致月以辨四時之叙賈疏謂四時之景合度乃徳政所致故晷進則水晷退則旱愚按若以今厯家言之則此皆由厯之疎密耳顔氏家訓省事篇内有一條論此最明盖二説當並行馮相疏謂大歳在地與天上歳星相應而行一嵗移一辰又分前辰為一百三十四分而侵一分則一百四十四年跳一辰嵗星為陽人之所見大嵗為隂人所不睹又曰今厯無跳辰之義故注云今厯大厯非此也愚按旣不是跳辰之大歳則所指又是何分野之説賈疏謂此古之受封之日嵗星所在之辰此補鄭注所不及其説甚是外史掌三皇五帝之書賈疏謂孝經緯云三皇無文世本云蒼頡造文字蒼頡黄帝之史則文字起于黄帝今此云三皇之書者三皇雖無文以有文字之後仰錄三皇時事故云掌三皇之書也愚按雖云蒼頡造字然蒼頡之前必已先有蒼頡特因而増定之耳不然伏羲神農之號豈皆後世所追尊乎外史掌達書名于四方鄭注謂若堯典禹貢達此名使知之或曰古曰名今曰字使四方知書之文字愚按朱子中庸注是用其後一解何椒丘周禮注論占夢論庭氏等官最精掌客賔客有喪唯芻稍之受鄭注専以父母之喪言然則非父母之喪饗食亦可受歟讀禮志疑巻六
