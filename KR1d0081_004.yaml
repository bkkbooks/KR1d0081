body:
  text: 讀禮志疑巻四贈内閣學士陸隴其撰洪武孝慈録一書直是師心自用朱子文集巻七十四策試榜喻云問唐開元釋奠儀設先聖神位於堂西東向先師位其東北南向初不云有像設及從祀諸子也今以當時人文章所記著考之則皆為夫子南面像門人亦像十二而圖其餘於壁是則開元之制施用于當時者亦無幾耳愚按一代之禮逐時増改不同古今皆然如明之㑹典其不施用者多矣何怪乎開元之釋奠儀哉今人或執一端以疑周禮者皆不通於時變者也宋人于銓選時必問其葬父母與否亦見于朱子策試榜喻此法大有益于禮教又文集一百巻勸諭榜内有云鄉里親知来相弔送但可協力資助不當責其供備飲食此一言大有益于䘮禮孔氏禮記卷首疏云古史考遂皇至于伏羲唯經三姓鄭康成六藝論曰遂皇之後厯六紀九十一代至伏羲其文不同未知孰是方叔機註六藝論云六紀者九頭紀五龍紀攝提紀合洛紀連通紀序命紀凡六紀也九十一代者九頭一五龍五攝提七十二合洛三連通六序命四凡九十一代也但伏羲之前伏羲之後年代參差所説不一緯候紛紜各相乖背且復繁而無用今並畧之唯據六藝論之文及帝王世紀以為説也案易繫辭云包犧氏没神農氏作帝王世紀云伏羲之後女媧氏亦風姓也女媧氏没次有大庭氏栢皇氏中央氏栗陸氏驪連氏赫胥氏尊盧氏渾沌氏昊英氏有巢氏朱襄氏葛天氏隂康氏無懐氏凡十五代皆襲伏羲之號然鄭𤣥以大庭氏是神農之别號封禪云無懐氏在伏羲之前今在伏羲之後則世紀之文未可信用又太上貴徳鄭注云太上帝皇之世孔疏云熊氏謂三皇稱皇者皆行合天皇之星鄭𤣥意則以伏羲女媧神農為三皇故註中候敕省圖引運斗樞伏羲女媧神農為三皇也然宋均註援神契引甄耀度數燧人伏羲神農為三皇譙周古史考亦然白虎通取伏羲神農祝融為三皇孔安國則以伏羲神農黄帝為三皇並與鄭不同此皆無所據其言非也鄭數伏羲女媧神農非謂其人身自相接其閒代之王多矣其五帝者鄭註中候敇省圖云徳合五帝坐星者稱帝則黄帝金天氏髙陽氏髙辛氏陶唐氏有虞氏是也實六人而稱五者以其俱合五帝坐星也散而言之則三皇亦稱帝月令云其帝太昊是也五帝亦稱皇吕刑云皇帝清問下民是也愚按此等處只宜分别諸家之説存而不論可也禮器云禮者體也祭義云禮者履此者也故鄭康成云禮者體也履也統之于心曰體踐而行之曰履此與朱子所云天理之節文人事之儀則亦大畧相似但鄭遂以周官為體儀禮為履周官為禮儀三百儀禮為威儀三千則拘矣經文用字有對文散文之不同又有古今之不同如幼子常視母誑疏云古者觀視于物及以物視人則皆作示傍著見後世觀視于物作示旁著見以物示人單作示字又户外有二屨疏云古人之言無問單之與複皆名為屨今人言屨正謂單者也此皆古今之不同也母蜡席孔疏云蜡猶躐也席既地鋪當有上下将就坐當從下而升當己位上不發初從上從上為躐席也玉藻所云者自是不由席前升與此别按集説即以玉藻之躐席為蜡席恐非是大夫士出入君門由闑右疏云門以向堂為正右在東集說止云闑東為右欠明拾級聚足鄭注云拾當為涉聲之誤也集説却将拾字正解作涉字不是帷薄之外不趨疏云薄簾也愚按賈生治安策帷薄不修即此薄字奉席如橋衡鄭注云橋井上㮮橰疏云左昂右低如橋之衡衡横也集説却云如橋之髙如衡之平解来却相反孔疏云席南鄉北鄉以西方為上者謂東西設席南鄉北鄉則以西方為上頭也所以然者凡坐隨于隂陽若坐在陽則貴左坐在隂則貴右南坐是陽其左在西北坐是隂其右亦在西也東鄉西鄉以南方為上者謂南北設席坐在東方西向是在陽以南方為上坐在西方東鄉是在隂亦以南方為上亦是坐在陽則上左坐在隂則上右按集説於此條載朱子之説似不如孔疏之詳孔疏又曰此據平常布席如此若禮席則不然案鄉飲酒禮註云賔席牖前南面主人席阼階上西面介席西階上東西與此不同愚按曲禮所言是並坐之上下鄉飲酒所言是對坐之上下恐不當引此説侍飲于長者酒進則起拜受于尊所燕禮鄉飲禮皆不云拜受于尊所集説吕氏云以禮與侍飲異也孔疏云疑是文不具耳愚按孔疏是餕餘不祭集説有二解孔疏又是一解今姑從集説前一解水潦降不獻魚鼈孔疏引定四年水潦方降謂天降下水潦魚鼈難得集説云水涸魚鼈易得不足貴故不獻此等處不見得誰是獻田宅者操書致孔疏云古者田宅悉為官所賦本不屬民今得此田宅獻者是或有重勲為君王所賜可為已有故得有獻集説吕氏亦如此解然愚按既是君所賜豈得擅獻人燕噲之讓子之鄭伯之假許田君子皆譏之則此解豈可通乎竊恐是周衰之變禮下文前有車騎則載飛鴻疏亦云古人不騎馬今言騎者當是周末時禮知生者弔知死者傷鄭注云弔傷皆謂致命辭也孔疏云皆不自往而遣使致已之命也愚按此則分而言之曰弔曰傷故弔有弔詞傷有傷詞若通而言之亦曰弔而已矣集説殊欠分明禮不下庶人非是都不行禮也鄭注云為其遽于事且不能備物孔疏云其有事則假士禮行之刑不上大夫非謂都不刑其身也鄭注云其犯法則在八議輕重不在刑書孔疏云若大夫罪未定之前則皆在八議若罪已定将刑殺則適甸師氏集説曰不制大夫之刑猶不制庶人之禮也愚按先王于上下之際分别如此為士君子者其可不知自異于庶人乎前有摰獸則載貔貅集説不言貔貅是何獸孔疏曰貔貅是一獸又曰貔一名曰豹虎類也父之讐弗與共戴天孔疏云公羊説復百世之讐古周禮説復讐之義不過五世許慎謂魯桓公為齊襄公所殺其子莊公與齊桓公㑹春秋不譏又定分是魯桓公九世孫孔子相定公與齊㑹于夾谷是不復百世之讐也從周禮説鄭康成不駁即與許慎同愚按集説于此亦畧不言孔疏言易繋辭蓍龜相似無長短僖四年左傳晉太史欲止公之意托云筮短龜長耳實無優劣也若杜預鄭𤣥因筮短龜長之言以為實有長短愚按孔氏甚尊康成而此却不以其説為然孔疏天子諸侯國之大事先筮而後卜則據筮人而言次事唯卜不筮則據表記而言小事無卜唯筮則據筮人而言又云春秋僖二十五年晉卜納襄王得黄帝戰于阪泉之兆又筮之得大有之暌哀九年晉卜伐宋亦卜而後筮是大事卜筮並用也但春秋亂世皆先卜後筮不能如禮鄭注周禮云筮凶則止不卜洪範有筮逆龜從者崔靈恩云凡卜筮天子皆用三代蓍龜若三筮並凶則止而不卜鄭云若一吉一凶雖筮逆猶得卜之也又疏云其大夫則大事卜小事筮説得諸經異同處最明又鄭注大事卜小事筮疏則云此大事者謂小事之中為大事蓋緣鄭注與疏前意不同故為之幹旋如此泰龜泰筮疏云欲褒美此龜筮故謂為太龜太筮也愚按龜筮而尊崇其名如此古人之敬卜筮如此介者不拜孔疏云介甲鎧也集説云介冑也集説誤曲禮下云提者當帶孔疏謂朝服之屬其帶則髙於心深衣之類其帶則下于脇提者當帶謂深衣之帶集説止云深衣之帶也便不明白又執天子之器則上衡孔疏謂衡平也平謂人之拱手正當心平故謂心爲衡凡言衡有二處若大夫衡視則面為衡集說亦取疏意而刪去數語讀者便難曉又後國君綏視大夫衡視孔疏云綏頺下之貌前執器以心為平故以下為綏此視以面為平故綏下于面則上于祫也集説亦本之而不如疏之明主佩倚則臣佩垂孔疏云倚猶附也君宜直立則佩直附倚身集説却云微俛則倚于身微俛二字不是執玉其有籍者則裼無籍者則襲鄭注載有兩説其前一説是正意集説反取其後一説恐未是裼襲二字孔疏于執玉條前則云凡執玉之時必有其藻以承于玉若盡飾見美之時必垂藻于兩端令垂向于下謂之有藉當時所執之人則去體上外服以見在内裼衣故云有藉者則裼也其事質充美之時承玉之藻不使下垂屈而在手謂之無藉當時所執之人則掩其上服襲蓋裼衣謂之無藉者則襲藻藉有二種一者以韋衣木畫之也二者絢組垂之若版之藻藉則常有今言無者據垂之也其垂藻之時則須裼後則云襲所以異于襲者凡衣近體有袍襗之屬其外有裘夏月則衣葛其上有裼衣裼衣上有襲衣襲衣之上有常著之服則皮弁之屬也掩而不開則謂之為襲若開此皮弁及中衣左袒出其裼衣謂之為裼故鄭注聘禮云裼者左袒也據前所言則裼似去外服據後所言則裼只似袒存疑解鄉黨則又似有直領曲領之分未知果如何又按玉藻襲裘不入公門孔疏云裘上有裼衣裼衣之上有襲衣襲衣之上有正服但據露裼衣不露裼衣為異耳愚按此只云露不言何様露法想或去而露之或袒而露之或直其領而露之其制原不一也君子行禮不求變俗祭祀之禮居喪之服哭泣之位皆如其國之故祭祀之禮即夏立尸殷坐尸周旅酬六尸及先求隂陽犧牲騂黒之屬也居喪之服者殷雖尊貴猶服傍親周則以尊降服哭泣之位者殷不重適以班髙處上周世貴正嗣孫居其首愚按議禮者不可不知古今之變席蓋孔疏謂喪車蓋也臣有死于公宫可許将柩出門不得将喪車凶物入也集説却云席所以坐卧盖所以蔽日與雨恐集說不是苞屨扱袵厭冠不及公門孔疏謂服問云唯公門有稅齊註云不杖齊衰也于公門有免齊衰則大功有免絰也如鄭之言五服入公門與否各有差降熊氏云父之喪惟扱上袵不入公門冠絰衰屨皆得入也杖齊衰則屨不得入不杖齊衰衰又不得入其大功絰又不得入其小功以下冠又不得入此厭冠者謂小功以下之冠故云不入公門凡喪冠皆厭大功以上厭冠宜得入公門也愚按集説云此皆凶服故不可以入公門並不言有差降則與所謂不奪人之喪者違矣孔疏引大戴禮王度記云大夫俟放于郊三年得環乃還得玦乃去愚按古人既不得于君矣而猶待放三年既得玦而去國踰境矣而猶為壇鄉哭素衣髦馬三月而後復服其忠厚不忘君如此鄭康成禮註所謂臣無君猶無天也此當與孟子三月無君則弔及三宿而去同看大夫無故不徹縣士無故不徹琴瑟孔疏曰熊氏云案春秋説題辭樂無大夫士制鄭氏箴膏肓從題辭之義大夫士無樂小胥大夫判縣士特縣者小胥所云娯身之樂及治人之樂則有之也故鄉飲酒有工歌之樂是也説題辭云無樂者謂無祭祀之樂故特牲少牢無樂若然此云大夫不徹縣士不徹琴瑟者謂娯身及治民之樂也愚案此說樂制明矣然衆仲所謂大夫四士二則又如何解措之廟立之主曰帝鄭注引春秋傳曰凡君卒哭而祔祔而作主正義曰此是左傳僖三十三年之言也天子七月而葬九月而卒哭諸侯五月而葬七月而卒哭大夫三月而葬五月而卒哭士三月而葬是月而卒哭卒哭者是𦵏竟虞數畢後之祭名也孝子親始死哭晝夜無時葬後虞竟乃行神事故卒其無時之哭猶朝夕各一哭故謂其祭為卒哭明日而立主祔于廟隨其昭穆從祖父食卒哭主暫時祔廟畢更還殯宫至小祥作栗主入廟乃埋桑主于祖廟門左埋重處故鄭云虞而作主至袝奉以祔祖廟既事畢返之殯宫然大夫士亦卒哭而祔而左傳唯據人君有主者言之故云凡君鄭注祭法云大夫士無主也此言凡君明不關大夫士也崔靈恩云大夫士無主以幣帛祔祔竟並還殯宫至小祥而入廟也又檀弓云重主道也鄭注引公羊傳云虞主用桑練主用栗則似虞已有主而左傳云祔而作主二傳不同者案説公羊者朝葬日中則作虞主若鄭君以二傳之文雖異其意則同皆是虞祭總了然後作主以作主去虞實近故公羊上係之于虞作主謂之虞主又作主為祔所須故知左氏據祔而言故云祔而作主愚按此疏叙作主次第最詳然又須看朱子答陸子壽李繼善諸書天子有后條孔疏載鄭氏周禮九嬪註云女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而徧愚按汪苕文輩皆以此註為非然所謂當夕者只是派定以備人君之幸御至于節欲之法自在人主豈必慮其過哉天子建天官先六大鄭註云此盖殷時制也孔疏云鄭註大傳夏書云所謂六卿者后稷司徒秩宗司馬作士共工也而不說殷家六卿之名今此記所言上非夏法下異周典鄭唯指為殷禮也太宰既尊故先列太宰并顯太宰之下𨽻屬太宰之官故云先六大集説以鄭氏無所考證皆臆説愚按若不作殷制看便不可解大士孔疏云知大士非司士及士師卿士之等者以其下别有司士司宼故知非士師卿士也與大祝大卜相連皆主神之士愚案集説不言大士是何官殊畧孔疏又云司士主公卿以下版籍爵禄之等集説亦畧不言孔疏宗伯春曰朝夏曰宗秋曰覲冬曰遇若通而言之悉曰朝從初受名愚按此亦猶仁之有專言偏言也又如春蒐夏苗秋禰冬狩而春秋四時田獵皆曰蒐孔疏又曰案大行人云候服嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見六服分来又每方服别分為四分一分朝春一分宗夏一分覲秋一分遇冬愚案此朝覲之制與書蔡註所説羣后四朝六年五服一朝之制不同鄭康成云覲禮今存朝宗遇禮今亡然又云諸侯春見曰朝受摯于朝受享于朝秋見曰覲一受之于廟此不知其何據孔疏第云是春朝也先受朝竟然後入廟亦不言其據鄭康成又云朝者位于内廟而序進覲者位于廟門外而序入孔疏云此内朝即路門外朝也對臯門内三槐九棘之外朝故稱内也若對路寝庭朝又為外又云凡天子三朝一在路門内謂之燕朝太僕掌之二是路門外之朝謂之治朝司士掌之其三是臯門之内庫門之外謂之外朝朝士掌之諸侯亦有此三朝愚案司士所掌治朝之位王南鄉三公北面東上孤東面西上卿大夫西面北上與曲禮所謂諸公東面諸侯西面者不同孔疏並不詳其何故既葬見天子曰類見孔疏云春秋之義三年除喪之後乃見而今云既葬者謂天子或巡狩至境故得見天子未𦵏未正君臣故雖天子巡狩亦不見也愚按此疏甚明集説畧而不言何故問大夫之子長曰能御矣鄭注云御猶主也書曰越乃御事謂主事者此説不可易集説却云御御車也甚謬天子祭天地孔疏云天神有六祭之一歳有九昊天上帝冬至祭之一也蒼帝靈威仰立春之日祭之于東郊二也赤帝赤熛怒立夏之日祭之于南郊三也黄帝含樞紐季夏六月土王之日亦祭之于南郊四也白帝白招拒立秋之日祭之于西郊五也黒帝汁光紀立冬之之日祭之于北郊六也王者各稟五帝之精氣而王天下于夏正之月祭于南郊七也四月龍星見而雩總祭五帝于南郊八也季秋大饗五帝于明堂九也地神有二嵗有二祭夏至之日祭崑崙之神于方澤一也夏正之月祭神州地祇于北郊二也或云建申之月祭之與郊天相對冬至祭昊天上帝者春秋緯云紫微為天帝北極耀魄寳是也其配之人以帝嚳配之故祭法云周人禘嚳是也其五帝則春秋緯文耀鈎云蒼帝曰靈威仰赤帝曰赤熛怒黄帝曰含樞紐白帝曰白招拒黒帝曰汁光紀愚案此條疏發明鄭氏天地之説最詳要之本于䜟緯而不可據有其廢之莫敢舉也有其舉之莫敢廢也鄭注云後有徳者繼之不嫌也愚按此註似不若集説方氏之無弊天子以犧牛諸侯以肥牛大夫以索牛孔疏云上得兼下下不得僭上集説不及此意嫌畧在朝言禮問禮對以禮孔疏云言及問對則宜毎事稱禮也集説云朝廷之上凡所當言者皆禮也一問一對必稽于禮二説不同集説為長王制鄭康成註云殷爵三等者公侯伯也異畿内謂之子周武王初定天下更立五等之爵増以子男而猶因殷之地以九州之界尚狹也周公攝政致太平斥大九州之界制禮成武王之意封王者之後為公及有功之諸侯大者地方五百里其次侯四百里其次伯三百里其次子二百里其次男百里所因殷之諸侯亦以功黜涉之其不合者皆益之地為百里焉是以周世有爵尊而國小爵卑而國大者唯天子畿内不増愚按如此説則周禮與王制方不矛盾而程朱之意則以為是出于漢儒之附㑹不可盡信闕之可也今人讀書者不可不知康成之説又不可不知程朱之意凡四海之内九州州方千里九州千七百七十三國鄭云仍主王肅孔疏謂諸侯至士總而言之皆謂之官官者管也以管領為名故尚書周官云唐虞稽古建官惟百下云外有州牧侯伯是州牧侯伯亦為官也若細而言之曰諸侯非偏有所主則非官也故學記云大徳不官註云天子諸侯是也愚案此等處註疏最分曉注疏謂殷爵三等此或有之至引公羊何休之説云春秋改周之文從殷之質合伯子男為一此則難從孔疏謂天子上中下之士皆稱元士上農夫是受上地之農夫此皆似有理不知朱子孟子註何故不從天子三公九卿二十七大夫八十一元士鄭註云此夏制也孔疏云王制之文鄭皆以為殷法此獨云夏制者以明堂殷官三百與此百二十數不相當故不得云殷制也記者故雜記而言之或舉夏或舉殷也愚按此節集説引石梁王氏之説駁鄭註恐不是比年一小聘三年一大聘五年一朝鄭康成則云此時晉文霸時所制熊氏則云或以為虞夏法或以為殷法總因與周禮朝聘之期不合故多異義闕疑可也中庸朝聘以時似不應以此解若聘義云天子制諸侯比年小聘三年大聘則孔疏謂是諸侯自相聘是周公制禮之正法與王此殷制也周公制禮九州大界方七千里七七四十九方千里者四十有九也其一為畿内餘四十八八州各有方千里者六孔疏云此殷制也者以夏時萬國則地餘三千里周又中國方七千里今大界三千非夏非周故云殷制也云周公制禮九州大界方七千里者案大行人邦畿方千里其外方五百里謂之侯服甸服男服采服衛服要服服五百里通王畿四面為七千里大行人要服已外即云九州之外謂之蕃國是要服以内為巾國也愚案謂之殷制則周初武王之制亦如此矣大抵康成之意所以定此為殷制者盖以百里七十里五十里之國與周不同又千七百七十三國與禹萬國數復異然云禹承堯舜要服之内地方七千里是謂禹之地擴于唐虞也又云夏末既衰夷狄内侵諸侯相并土地減國數少殷湯承之更制中國方三千里之界亦分為九州而建此千七百七十三國焉是謂殷之地狹于夏也又云周公復唐虞之舊域分其五服為九其要服之内亦方七千里而因殷諸侯之數廣其土増其爵耳是謂周之地又擴于殷也此皆未見確據故程朱寧闕而不論而其解尚書弼成五服至于五千云輔五服而成之至于四方各五千里四面相距為方萬里王肅蔡沈亦皆不用其説孔疏于王制雖從鄭而于尚書則制所云又不同也造乎禰孔疏引白虎通曰獨見禰何辭從卑不敢留尊者之命謂出辭别先從卑起最後至祖仍取遷主則行也若前至祖後至禰是留尊者之命故不敬也愚按此推説禮意委曲得情小學在公宫南之左大學在郊鄭註云殷之制天子曰辟廱諸侯曰頖宫鄭不註是何代制集説引張子曰辟廱古無此名盖始于周恐亦難據大司樂賈疏曰五帝學總名成均當代則各有别稱三代天子學總曰辟雍當代則各有異名出征執有罪反釋奠于學釋奠二字注疏無定解集説則竟畧而不言天子諸侯無事則嵗三田鄭注云三田者夏不田孔疏何休云運斗樞曰夏不田穀梁有夏田于義為矩鄭𤣥釋之曰孔子雖有聖徳不敢顯然改先王之法教授于世若以其所欲改隂書于緯藏之以傳後王穀梁四時田者近孔子故也公羊正當六國之亡讖緯見讀而傳為三時田作傳有先後雖異不足以斷穀梁也如鄭此言三時之田不敢顯露隂書于緯四時之田顯然在春秋之經穀梁為傳之時去孔子既近不見所藏之緯唯覩春秋見經故以為四時田也公羊當六國之時去孔子既逺緯書見行于世公羊既見緯文故以為三時田愚案此言緯書之緣起最詳盖漢儒真以是為孔子書也孔疏云諸侯不掩羣者是畿内諸侯為天子大夫故下曲禮云大夫不掩羣此皆是熊氏之説若皇氏以此為夏殷禮下曲禮為周禮義或然也愚案此等異同處集説皆畧而不言豈不疎乎祭豐年不奢凶年不儉鄭注云常用數之仂集説不明白又按禮器云禮之薄厚與年之上下集説云王制言豐年不奢凶年不儉是専言祭禮此兼言諸禮耳則集説于王制固不主鄭説矣然鄭説自無病制國用條引律歴志章部統元之説云十九嵗為一章四章為一部二十部為一統三統為一元一元有四千五百六十歳初入元一百六嵗有陽九謂旱九年愚案此災歳似應即在四千五百六十年之内疏謂災歳另算恐未然大夫士庶人三日而殯三月而葬孔疏云左傳大夫言三月士言踰月此總言大夫士三月而葬者其實大夫三月者除死月為三月士三月者數死月為三月士之三月正大夫之踰月也若春秋之時天子諸侯之葬皆數死月愚案此處注疏甚明集説乃以為不然何也喪從死者祭從生者鄭注云從生者謂奠祭之牲器盧植云除服之後吉祭之時以子孫官禄祭其父祖若喪中之祭虞祔練祥仍從死者之爵引小記雜記虞祔之禮以證孔疏謂盧解據死者子孫身無官爵故喪中之祭皆用死者之禮若其生者有爵則祭從生者之法奠謂葬前祭謂葬後愚按如疏之説則盧鄭二解本不相礙然中庸祭以士祭以大夫二祭字却難看作二様讀禮志疑巻四
