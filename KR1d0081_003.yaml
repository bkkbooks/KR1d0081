body:
  text: 讀禮志疑卷三贈内閣學士陸隴其撰朱子文集内范伯崇問左傳僖公三十三年凡君薨卒哭而祔祔而作主特祀于主烝嘗禘於廟杜氏注謂此天子諸侯之禮不通於卿大夫葢卒哭後特用喪禮祀新死者於寢而宗廟四時常祭自如舊也此與禮記不同釋例又引晉三月而葬悼公改服修官烝於曲沃會於溴梁之事為騐戰國禮變如此葢三年之喪諸侯莫之行久矣左傳特記一時之事而杜氏乃誤為正禮也愚按在喪廢宗廟之祭見於王制曾子問明矣左氏所謂烝嘗禘于廟必是指除喪之後言而杜氏乃引晉平之變禮以證天子諸侯在喪亦祭宗廟恐不足㨿朱子答范伯崇云古人居喪衰麻之衣不釋于身哭泣之聲不絶于口其出入居處言語飲食皆與平日絶異故宗廟之祭雖廢而幽明之間兩無憾焉今人居喪與古人異卒哭之後遂墨其衰凡出入居處言語飲食與平日之所為皆不廢也而獨廢此一事恐亦有所未安竊謂欲處此義者但當自省所以居喪之禮果能始卒一合于古禮即廢祭無可疑若他時不免墨衰出入或其他有所未合者尚多即卒哭之前不得已準禮且廢卒哭之後可以畧仿左傳杜注之說遇四時祭日以衰服特祀于几筵用墨衰常祀于家廟可也但卒哭之期須既𦵏立主三虞之後卜日而祭以成事方可耳若神柩在而欲以百日為㫁墨衰出入則決然不可愚按朱子此段斟酌禮意曲盡其變真百代師也朱子答劉平甫云古禮廟無二主嘗原其意以為祖考之精神既散欲其萃聚于此故不可以二今有祠版又有影是有二主矣恐精神分散非鬼神所安愚按此恐未是古人所謂于彼乎于此乎似不妨有祠版復有影也葢未知祖考之精神萃於何處而兼設之於義無傷未可以二主之例懲之也朱子答林擇之云敬夫以墓祭節祠為不可然二先生皆言墓祭不害義理又節物所尚古人未有故止于時祭今人時節隨俗燕飲各以其物祖考生存之日葢嘗用之今子孫不廢此而能恝然于祖宗乎此恐太泥古不盡如事存之意愚按朱子此論最得時中之意朱子答王子合云家祭一節熹頃居喪不曾行但至時節略具飯食墨衰入廟酌酒瞻拜而已然亦卒哭後方如此前此無衣服可入廟也今服其喪未葬亦不敢行祭非略之乃謹之也按此條與答范伯崇書相𤼵明董叔重問曰服父母之喪而祭祀祖先當衣何服與居母喪而見父居父母喪而見祖父母其朔旦嵗節上夀為禮各衣何服父母在而遭所生喪不知合衣何服合與不合設几筵出聲哭舅姑俱存而子婦丁其父母憂雖合奔喪然卒哭後必當復歸恐三年之服自不可改遇節序變遷不審可以𤼵哀出聲否見舅姑及從舅姑以祭不知所易當何服朱子答云古者居喪三年不祭見曾子問其見祖父母之屬古人亦有節文不盡記然上夀之禮自不合與所生母喪禮律亦有明文更宜詳考亦當稍避尊者乃為安耳如女以適人為父母服期禮律亦甚明若有舅姑難以發哀于其側従祭但略去華盛之服可也愚按禮雖云不可奪喪而亦當稍避尊者最有折衷董叔仲問孟子集註古公亶父下注云太王公劉九世孫按史記自公劉至古公凡十世今謂九世豈不數古公己身耶然按豳詩集傳云公劉復修后稷之業十世而太王徙居岐山之陽則疑孟子集注或錯九字否朱子答云通數即計己身為數曰祖曰孫則不當計己身葢謂之祖孫則是指他人而言矣史傳及今人文字以髙祖之父為五世祖甚多無可疑也愚按此今人最易誤朱子與黄子耕云支子之祭先儒雖有是言然竟未安向見范文兄弟所定支子當祭旋設紙牓於位祭訖而焚之不得已此或可采用然禮文品物亦當少損於長子或但一獻無祝亦可也愚按朱子於家禮最重宗法故其論如此萬正淳問朱子曰謝氏説致生之故其鬼神致死之故其鬼不神何也人以為神則神人以為不神則不神矣按夫子致生致死之説本為明器𤼵也以致死之為不仁故必有是明器以致生之為不智故為是明器而不可用故曰神明之也謝氏之意則與此不同矣又其説主乎致生故謂人以為神則神如此則所謂鬼神者其有無專係乎人心而已無乃似流於作用是性之失乎又曰以為有亦不可以為無亦不可這裏有妙理又曰自家要有便有要無便無皆是此意朱子答曰記得論語説中似有當生者使人致生之當死者使人致死之此却有理愚按謝氏論語説所謂當生者指當格之鬼神言所謂當死者指當遠之鬼神言格之斯有逺之斯無鬼神之有無其源在人仁人孝子之於祭祀何不盡其誠乎吳伯豐問朱子曰那綏我思成集傳鄭氏所引禮記之説程子則曰此特孝子平日思親之心耳若齊則不容有思有思非齊也竊謂人心不容無思齊之日特齊其不齊者耳若思其居處之類乃其致誠意以交乎神者葢未害其為齊也未知是否朱子答曰鄭氏所引者常法也程子之義則益精矣愚按今詩傳只主鄭説論語端章甫蒙引云君相皆然考陳氏禮書及文獻通考諸侯𤣥冕以祭則宗廟非君臣同服也會同之服雖無明文然考諸侯相朝聘用皮弁則會同亦非君臣同服也朱子答吳伯豐曰所疑今日之來格者非前日之𤼵揚者則非是只思上蔡祖考精神便是自家精神一句則可見其苖脈矣又曰大抵人之氣傳於子孫猶木之氣傳於實也此實之傳不冺則其生木雖枯毁無餘而氣之在此者猶自若也愚按來格之鬼神恐是𤼵揚之散未盡者不可以木實為喻上蔡之説恐亦不如此朱子答應仁仲論儀禮經傳通解云前賢常患儀禮難讀以今觀之只是經不分章記不隨經而注疏各為一書故使讀者不能遽曉今定此本盡去此諸弊恨不得令韓文公見之也愚按治經如治田定其疆理方可下手又答周叔謹云右本在上者齊衰絰之制以麻根處著頭右邉而從額前向左圍向頭後却就右邉元麻根處相接即以麻尾藏在麻根之下麻根撘在麻尾之上又云菅屨疏屨今不可考今略以輕重推之斬衰用草鞋齊衰用麻鞋可也愚按此皆可補注疏之略朱子答趙子欽論禮圖云室之户牖並列于前不知以幾分為牖房在室東而無北壁不知其南户有扉否房之户當中耶近東角耶近西角耶兩堦當直東西序之中而上耶近兩楹而上耶近兩壁而上耶須先定此地盤間架乃可議其升降出入愚按朱子讀禮仔細如此陳安卿問如臨乎有喪者之側主人固留飲或辭之不得或與長者同行長者留則少者有不得而辭者辭以實則形主人之非禮辭以疾則偽難掩力辭而峻拒則又恐咈情而近於硜硜之信果不知如何為當朱子答曰此須力辭必不得已而留亦須數辭先起不可醉飽安卿又問程子曰人無父母生日當倍悲痛如先生舊時亦嘗有夀母生朝及太碩人生朝與向日賀髙倅詞恐非先生筆不審又何也豈在人子自已言則非其所宜而為父母待親朋則其情又有不容己處否然恐為此則是人子以禮律身而以非禮事其親以非禮待於人朱子答曰此等事是力量不足放過了處然亦或有不得已者其情亦不同也愚按此二條可見朱子之門於一切流俗積習皆必不肯輕易放過陳安卿問鄉人儺古人此禮節目不可考朱子答曰後漢志中有此想亦近古之遺法愚按此是以今推古之法陳安卿問用明器亦君子不死其親之意自不容以廢之耶朱子答曰熹家不曾用愚按古禮有不必用者此也朱子答葉味道曰國語日祭月祀時享既與周禮祀天神祭地示享人鬼之名不合韋昭又謂日上食於祖禰月祀於曾髙時享於二祧亦但與祭法略相表裏而不見於他經愚按國語之義本不可考然朱子又云左氏云特祀於寢而國語有日祭之文則是主復寢後猶日上食矣是朱子之意以日祭為喪禮歟葉味道問親迎男女遭喪之禮曾子問之詳矣今有男就婚於女家久而未歸若婿之父母死女之奔喪如之何若女之父母死其女之制服如之何朱子曰此乃原頭不是且倣在塗之禮行之可也然既嫁則服自當降既除而歸夫家耳又問雜記姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親不主夫若無族矣則前後家東西家無有則里尹主之朱子曰古法既廢鄰家里尹決不肯祭他人之親則從宜而祭之别室其亦可也又問女子適人為父母服期喪大記曰喪父母既練而歸期九日既葬而歸或在母家彼此有所不便不可以待練之久如之何朱子曰歸而不變其居處飲食之節可也衣服則不可不變愚按此三條皆可見朱子斟酌古今之宜又葉味道問昔侍先生見早晨入影堂焚香展拜而昏暮無復冄入未知尊意如何朱子曰向見今趙丞相日於影堂行昏定之禮或在燕集之後竊疑未安故每常只循舊禮晨謁而已愚按此一條可想見朱子對祖考肅敬之容朱子答徐居甫論左氏先配後祖之説曰其後説親迎處亦有布几筵告廟而來之説恐所謂後祖者譏其失此禮耳愚按如此説方與三月廟見之禮合竇文卿問子之所生母死不知題主當何稱朱子曰若避嫡母則止稱亡母而不稱妣以别之可也愚按此不見經是朱子以義起之朱子答曾擇之曰百日卒哭乃開元禮以今人𦵏或不能如期故為此權制殊失禮意若過期未葬自不當卒哭愚按朱子非泥古者其為此言警人也至矣潘子善問云康王釋喪服而被袞冕受虎賁之迎於南外之門且受黄朱圭幣之獻諸家皆以為禮之變獨蘓氏以為失禮使周公在必不為此未知當此際合如何區處朱子答曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語葢謂此類耳如伊訓元祀十二月朔亦是新喪伊尹已奉嗣王祗見厥祖固不可用凶服矣漢唐新主即位皆行册禮君臣亦皆吉服追述先帝之命以告嗣君韓文集順宗實錄中有此事可考葢易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣愚按此條朱子不取蘇氏之説與蔡氏書傳不同朱子答余彞孫曰大凡禮樂制度若欲理會須從頭做工夫愚按如讀禮記不讀儀禮便不是從頭工夫朱子答嚴時亨曰親親長長貴貴尊尊皆天下之大經固當各有所尚然亦不可以此而廢彼故鄉黨雖尚齒而有爵者則俟賓主獻酬禮畢然後入又席於尊東使自為一列不為衆人所壓如此則長長貴貴各不相妨固不以齒先於爵亦不以爵加於齒也愚按官爵者朝廷所以馭天下之大柄也官爵尊然後朝廷重使天下視官爵為易得而不足重之物而卑賤者不肯俯然詘於其下則其風何可長哉觀古者鄉黨之禮可為太息又答嚴時亨曰喪禮自葬以前皆謂之奠其禮甚簡葢哀不能文而於新死者亦未忍遽以鬼神之禮事之也自虞以後方謂之祭故禮家謂奠為喪祭而虞為吉祭葢漸趨於吉也酧酒有兩説一用鬱鬯灌地以降神則惟天子諸侯之禮有之今其書亡不可深考一是祭酒葢古者飲食必祭今以鬼神自不能祭故代之祭也今人雖存其禮而失其義不可不知愚按知奠與祭之分則知今人之奠煩其文者非矣酧酒之禮今人或行於祭畢之後既非灌地又非代祭其失禮尤明朱子答曾光祖曰主式乃伊川先生所制初非朝廷立法固無官品之限萬一繼世無官亦難遽易但繼此不當作耳牌子亦無定制竊意亦須似主之大小髙下但不為判合䧟中可也凡此皆是後賢義起之制今復以意斟酌如此若古禮則未有考也愚按當與家禮同看又巻六十四答潘立之曰只於宗子之家立主而祭其支子則只用牌子其形如木主而不判前後不為陷中及兩竅不為櫝以從降殺之義又李晦叔問程氏祭義謂凡配止以正妻一人或奉祠之人是再娶所生即以所生母配竊謂凡配止用正妻一人是也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配享可乎朱子答曰程先生此説恐誤唐會要中有論凡是嫡母無先後皆當並祔合祭與古諸侯之禮不同晦叔又問曰夫主不可以二者也四明髙氏之説云耳此謂有宗子之家主祭故庶子止以其牲祭於宗子之家可也今人若兄弟異居相去遼逺欲各祭其父祖亦謂不可以二主乎朱子答曰兄弟異居廟初不異只合兄祭而弟與執事或以物助之為宜向見説前輩有如此而相去遠者則兄設主弟不立主只於祭時旋設位以紙榜標記逐位祭畢焚之如此似亦得禮之變也又曰魏公贈諡只告於廟疑為得禮但今世皆告墓恐未免隨俗耳愚按此三條皆斟酌古今之宜李晦叔又問子事父母劉元承所編二先生語錄謂婦當拜於堂下子不當拜於堂下葢父子主恩婦乃義合朱子答曰子婦一例恐不當有分别愚按朱子於程子之説不敢漫從如此李晦叔又問為長子三年及為伯叔兄弟皆期服而不解官為士者許赴舉不知當官與赴舉時還吉服耶若須吉服則又與五服所載年月相戾矣朱子答曰此等事只得遵朝廷法令若心自不安不欲赴舉則勿行可也當官則無法可解罷但雖不得不暫釋衰亦未可遽純吉也愚按凡束於功令而心自不安者必存其不得己之意方可李晦叔又問横渠先生曰祔𦵏祔祭極至理而論只合祔一人譬之人情一室中豈容二妻以義㫁之須祔以首娶繼室别為一所可也朱子答曰死而配祔又非生存之比横渠之説似亦推之有太過也只合從唐人所議為允况又有前妻無子後妻有子之礙其勢將有甚杌隉而不安者惟葬則今人夫婦未必皆合葬繼室别營兆域宜亦可耳愚按此當與前問程氏祭儀一條同看胡伯量問風水之説朱子答曰伊川先生力破俗説然亦自言須是風順地厚之處乃可然則亦須稍有形勢拱揖環抱無空闕處乃可用也但不用某山某水之説耳愚按所謂拱揖環抱即伯量所謂衆山拱揖水泉環繞藏風聚氣之地也然欲求其拱揖環繞勢必審其去來向背則某山某水之説亦勢所必至但不可太拘滯耳胡伯量又問禮居喪不弔朱子曰吉禮固不可預然弔送之禮却似不可廢所謂禮從宜者為此也愚按弔喪雖可従宜然亦須在小祥之後行之胡伯量又問程先生定主式尺法朱子答曰尺様温公有圖後人刻之於石其説甚詳沙隨程氏所据即此本也愚按議禮者必先考尺法不知尺法而言禮猶瞽説也李繼善問政和儀六品以下至庶人無朔奠九品以下至庶人無誌石而温公書儀皆有之今當以何者為㨿朱子答曰既有朝奠則朔奠且遵當代之制不設亦無害但誌石或欲以為久遠之騐則略其文而淺瘞之亦未遽有僭逼之嫌也嘗見前輩説大凡誌石須在壙上二三尺許即他日或為畚鍤誤及猶可及止若在壙中則已暴露矣雖或見之無及於事也此説有理愚按當代之制有可通融者誌石之類是也置壙上似尤不若内外俱置之李繼善又問檀弓既祔之後惟朝夕哭拜朔奠而張先生以為三年之中不徹几筵故有日祭溫公亦謂朝夕當饋食則是朝夕之饋當終喪行之不變與禮經不合不知如何朱子答曰此等處今世見行之禮不害其為厚而又無嫌於僭且當從之愚按此等處當與李晦叔所問諸條同看又答李繼善曰横渠説三年後祫祭於太廟因其祭畢還主之時遂奉祧主歸於夾室遷主新主皆歸於其廟此似為得禮鄭氏周禮注大宗伯享先王處似亦有此意但既祥而撤几筵其主且當祔於祖父之廟俟祫畢然後遷耳愚按觀此不但祔與遷是兩事而遷之之際亦有次第如此但朱子與胡伯量論中月而禫曰今既定以二十七月為期即此等不須瑣細尋討則二十七月而撤几筵似亦無妨伯量所引開元禮政和禮皆闕禫而祔想亦是如此但祔與遷分别不明白耳郭子從問古者男子殊衣裳婦人不殊裳今以古人連屬之衰加於婦人殊裳之制加於男子則世俗未之嘗見皆以為迂且怪而不以為禮也朱子答曰若考得古制分明改之固善若以為難即從俗亦無甚害郭又問孤哀子朱子答曰温公所稱葢因今俗以别父母不欲混并之也且從之亦無害郭又問周制有大宗之禮乃有立適之義立適以為後故父為長子權其重者若然今大宗之禮廢無立適之法而子各得以為後則長子少子當為不異庶子不得為長子三年者不必然也父為長子三年者亦不可以適庶論也朱子答曰宗子雖未能立然服制自當從古是亦愛禮存羊之意不可妄有改易也如漢時宗子法已廢然其詔令猶云賜民當為父後者爵一級是此禮意猶在也豈可謂宗法廢而諸子皆得為父後乎愚按朱子言禮有從俗者有决不從俗者合而觀之可以見其權度又答郭子從曰所引剪屏柱楣是兩事柱音知主反似是從手不從木也葢始者户北向用草為屏不剪其餘至是改而西向乃剪其餘草始者無柱與楣簷著於地至是乃施短柱及楣以拄其楣架起其簷令稍高而下可作户也來喻乃於柱楣之下便云既虞乃剪而除之似謂剪其屏而并及柱楣則誤矣愚按此等處皆古人居喪次第不可草草又答郭子從曰古者一世自為一廟自後漢以來乃為同堂異室之廟一世一室而以西為上如韓文中家廟碑有祭初室祭東室之語今國家亦只用此制故士大夫家亦無一世一廟之法而一世一室之制亦不能備故温公諸家祭禮皆用以右為尊之説獨文潞公嘗立家廟今溫公集中有碑載其制度頗詳亦是一世一室而以右為上自可檢看伊川之説亦誤大抵今士大夫家只當且以溫公之法為定也愚按以西為上之制前賢盡從之後人何必復為紛紛之論耶答葉仁父曰始祖先祖之祭伊川方有此説固足以盡孝子慈孫之心然嘗疑其禮近於禘祫非臣民所得用遂不敢行徳厚者流光徳薄者流卑故古者大夫以下極於三廟而干祫可以及其高祖今用先儒之説通祭髙祖已為過矣其上世久逺自合遷毁不當更祭也愚按朱子於祭禮多主温公而不主伊川答余正甫論魏元成加服曰觀當時所加曾祖之服仍為齊衰而加至五月非降為小功也今五服格仍遵用之雖於古為有加然恐亦未為不可也伯叔之服先儒固謂雖制服亦可然則徴議未為大失也至於論外祖父母止服小功則姨與舅自合同為緦麻徴反加舅之服以同于姨則為失耳抑此增損服制若果非是亦自只合坐以輕議禮經之罪恐與失節事讎自不相須也葢人之姿禀見識不同或明于此而暗于彼或得於彼而失於此當取節焉不可株連蔓引而累罪併贓也愚按如此論事最公若愚謂象山不知祔與遷為兩事由於學術之差則又不可以此例又答余正甫論神坐上右云漢儀后主在帝之右不知見於何處若只是後漢志注中所引漢舊儀則與史之正文不同恐不足為㨿若别有㨿則又不可知也但禮云席南向北向以西方為上東向西向以南方為上則是東向南向之席皆上右西向北向之席皆上左也今祭禮考妣同席南向則考西妣東自合禮意開元釋奠禮先聖東向先師南向亦以右為尊與其所定府君夫人配位又不相似不知何也大率古以右為尊如周禮云享右祭祀詩云既右烈考亦右文母漢人亦言無能出其右者是皆以右為尊也又若今祭禮一堂之上祖西考東而一席之上考東妣西則舅婦常聨坐矣此似未便也愚按此條當與郭子從祭禮論以西為上一條同看周君謨著朱子家禮祠祭圖説深辨以西為上之非其亦未喻此與又答余正甫曰喪祭二禮别作兩門居邦國王朝之後亦甚穏當前此疑於家邦更無安頓處也愚按觀此則勉齋所輯其凡例仍定于朱子朱子文集巻六十八内有井田類説跪坐拜説九拜辨壺説深衣制度明堂説儀禮釋宫社壇説巻六十九内有禘祫議漢同堂異室議君臣服議臣民禮議天子之禮釋菜儀親迎略諸篇留心古今制度皆非俗儒所及斯誠言禮者之階梯也朱子文集巻七十内有記永嘉儀禮誤字記鄉射疑誤二篇讀儀禮者所當知又巻七十一偶讀謾記云魏徴以小戴禮綜彚不倫更著類禮二十篇數年而成太宗美其書錄寘内府今此書不復見甚可惜也愚按今既有儀禮經傳通解則徴書雖不存可矣讀禮志疑巻三
